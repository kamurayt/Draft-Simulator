<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドラフトシミュレーター</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#0b1020;color:white;font-family:sans-serif;text-align:center}
button{margin:5px;padding:10px 14px;border-radius:10px;border:none;font-weight:bold}
button:disabled{opacity:.4}
input,select{padding:10px;border-radius:10px;border:none;margin:8px;font-weight:bold}
.hidden{display:none!important}
.screen{min-height:100vh;padding:30px 15px}
h1{font-size:42px;margin-top:70px}
.ruleBox{max-width:320px;margin:15px auto;display:flex;justify-content:space-between;align-items:center;font-size:20px}
.selectedTeam,.selectedRole{background:yellow!important;color:black!important}
.top{padding:8px;background:#0b1020;border-bottom:1px solid #26304a;position:sticky;top:0;z-index:5}
.layout{display:grid;grid-template-columns:1fr 2.2fr 1fr;gap:6px;padding:6px;height:calc(100vh - 120px)}
.team{display:flex;flex-direction:column;gap:6px}
.player{border:2px solid #444;border-radius:10px;background:#151b2e;padding:7px 3px;font-size:11px;min-height:50px}
.me{border-color:#5ecbff;box-shadow:0 0 12px #5ecbff}
.ready{border-color:#6dff91}
.active{border-color:yellow!important;box-shadow:0 0 15px yellow!important}
.banBox{background:#202846}
.centerBox{border:2px solid #334;border-radius:12px;background:#10172a;padding:6px;display:flex;flex-direction:column;min-height:0}
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:4px}
.filters button{font-size:10px;padding:6px}
.searchInput{width:90%;margin:5px auto}
.pokemonScroll{flex:1;overflow-y:auto;border:1px solid #2f3a5a;border-radius:10px;padding:6px;display:flex;flex-wrap:wrap;justify-content:center;align-content:flex-start;gap:5px}
.pokemonScroll button{min-width:78px;font-size:10px;padding:7px 4px}
.role-アタック{background:#ff5c5c;color:white}
.role-バランス{background:#b76cff;color:white}
.role-スピード{background:#4db8ff;color:white}
.role-ディフェンス{background:#5cff7a;color:black}
.role-サポート{background:#ffe45c;color:black}
.pickControl{border-top:1px solid #2f3a5a;margin-top:6px;padding-top:6px;font-size:13px}
.bigPick{background:#1f2a44;border-radius:12px;padding:10px;margin:5px;font-size:17px;font-weight:bold}
.popup,.toast{position:fixed;z-index:100}
.popup{inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center}
.popupContent{background:#142456;border:3px solid #5ecbff;border-radius:16px;padding:25px}
.popupTitle{font-size:26px;font-weight:bold}
.toast{left:50%;top:18%;transform:translateX(-50%);background:#101735;border:2px solid #9ee7ff;border-radius:14px;padding:12px 20px;font-weight:bold}
</style>
</head>

<body>

<div id="popup" class="popup hidden"></div>
<div id="toast" class="toast hidden"></div>

<div id="homeScreen" class="screen">
  <h1>ドラフトシミュレーター</h1>
  <button onclick="showRuleScreen()">ロビーを作る</button>
  <button onclick="showJoinScreen()">ロビーに入る</button>
</div>

<div id="ruleScreen" class="screen hidden">
  <h2>ルール設定</h2>

  <div class="ruleBox"><span>人数</span>
    <select id="teamSizeSelect"><option value="3">3v3</option><option value="5">5v5</option></select>
  </div>

  <div class="ruleBox"><span>形式</span>
    <select id="modeSelect"><option value="normal">通常ドラフト</option><option value="fearless">フィアレスドラフト</option></select>
  </div>

  <div class="ruleBox"><span>BAN数</span>
    <select id="banCountSelect">
      <option value="3">3体</option><option value="4">4体</option><option value="5" selected>5体</option>
      <option value="6">6体</option><option value="7">7体</option><option value="8">8体</option>
      <option value="9">9体</option><option value="10">10体</option>
    </select>
  </div>

  <div class="ruleBox"><span>試合形式</span>
    <select id="matchTypeSelect"><option value="BO1">BO1</option><option value="BO3">BO3</option><option value="BO5">BO5</option></select>
  </div>

  <button onclick="createRoomWithRules()">このルールで作成</button>
  <button onclick="showHome()">戻る</button>
</div>

<div id="joinScreen" class="screen hidden">
  <h2>ロビーに入る</h2>
  <input id="joinRoomId" placeholder="ロビーIDを入力" maxlength="5" oninput="checkJoinReady()">

  <div>
    <button id="joinTeamA" onclick="selectJoinTeam('A')">Aチーム</button>
    <button id="joinTeamB" onclick="selectJoinTeam('B')">Bチーム</button>
  </div>

  <div id="selectedJoinTeam">チーム未選択</div>

  <button id="loginButton" onclick="joinRoom()" disabled>ログイン</button>
  <button onclick="showHome()">戻る</button>
</div>

<div id="gameScreen" class="hidden">
  <div class="top">
    <div><span id="roomId">ロビーID：-----</span> <button onclick="copyRoomId()">コピー</button></div>
    <div><span id="phase">waiting</span>　<span id="timer">0</span></div>
    <div id="mySeat">あなた：未参加</div>
  </div>

  <div class="layout">
    <div id="teamA" class="team"></div>

    <div class="centerBox">
      <div id="roleFilters" class="filters"></div>
      <input id="searchInput" class="searchInput" placeholder="キャラ名で検索" oninput="setSearchText()">
      <div id="pokemonList" class="pokemonScroll"></div>
      <div id="pickControl" class="pickControl"></div>
    </div>

    <div id="teamB" class="team"></div>
  </div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDMtaAvmyEPs_Ezdo5L-vzrt2Q-H4MSkq0",
  authDomain:"unitedraft-7d800.firebaseapp.com",
  databaseURL:"https://unitedraft-7d800-default-rtdb.firebaseio.com",
  projectId:"unitedraft-7d800",
  storageBucket:"unitedraft-7d800.firebasestorage.app",
  messagingSenderId:"1064568783811",
  appId:"1:1064568783811:web:4176e95cf2ed8f5b437376"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let roomId="",phase="waiting",timer=0,interval=null,listening=false,isHost=false;
let currentTeam="",joinTeam="",myPlayerIndex=-1,turn="A",pickCount=0,selectedPick=null;
let settings={teamSize:3,mode:"normal",banCount:5,matchType:"BO1"};
let playersA=[],playersB=[],readyA=[],readyB=[],bansA=[],bansB=[],picksA=[],picksB=[],pickOrder=[];
let currentRole="All",searchText="";

let myId=localStorage.getItem("uniteDraftMyId");
if(!myId){myId=Math.random().toString(36).slice(2,11);localStorage.setItem("uniteDraftMyId",myId);}

const pokemon=[
{name:"アブソル",role:"スピード"},{name:"アマージョ",role:"バランス"},{name:"アローラキュウコン",role:"アタック"},
{name:"イワパレス",role:"ディフェンス"},{name:"インテレオン",role:"アタック"},{name:"ウッウ",role:"アタック"},
{name:"ウーラオス",role:"バランス"},{name:"エースバーン",role:"アタック"},{name:"エーフィ",role:"アタック"},
{name:"オーロット",role:"ディフェンス"},{name:"カイリキー",role:"バランス"},{name:"カイリュー",role:"バランス"},
{name:"カビゴン",role:"ディフェンス"},{name:"カメックス",role:"ディフェンス"},{name:"ガブリアス",role:"バランス"},
{name:"ガラルギャロップ",role:"スピード"},{name:"キュワワー",role:"サポート"},{name:"ギャラドス",role:"バランス"},
{name:"ゲッコウガ",role:"アタック"},{name:"ゲンガー",role:"スピード"},{name:"サーナイト",role:"アタック"},
{name:"ザシアン",role:"バランス"},{name:"ジュナイパー",role:"アタック"},{name:"ゼラオラ",role:"スピード"},
{name:"ゾロアーク",role:"スピード"},{name:"ダークライ",role:"スピード"},{name:"ドラパルト",role:"アタック"},
{name:"ニンフィア",role:"アタック"},{name:"ヌメルゴン",role:"ディフェンス"},{name:"ハピナス",role:"サポート"},
{name:"バシャーモ",role:"バランス"},{name:"バンギラス",role:"バランス"},{name:"ピカチュウ",role:"アタック"},
{name:"ファイアロー",role:"スピード"},{name:"フシギバナ",role:"アタック"},{name:"フーパ",role:"サポート"},
{name:"ブラッキー",role:"ディフェンス"},{name:"ホウオウ",role:"ディフェンス"},{name:"マスカーニャ",role:"スピード"},
{name:"ミミッキュ",role:"バランス"},{name:"ミュウ",role:"アタック"},{name:"ミュウツーX",role:"バランス"},
{name:"ミュウツーY",role:"アタック"},{name:"ミライドン",role:"アタック"},{name:"ヤドラン",role:"ディフェンス"},
{name:"ヤミラミ",role:"サポート"},{name:"ラプラス",role:"ディフェンス"},{name:"リザードン",role:"バランス"},
{name:"リーフィア",role:"スピード"},{name:"ルカリオ",role:"バランス"},{name:"ワタシラガ",role:"サポート"}
];

const roles=["All","アタック","スピード","バランス","ディフェンス","サポート"];

function showOnly(id){
  ["homeScreen","ruleScreen","joinScreen","gameScreen"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}
function showHome(){showOnly("homeScreen")}
function showRuleScreen(){showOnly("ruleScreen")}
function showJoinScreen(){showOnly("joinScreen")}
function roomRef(){return db.ref("rooms/"+roomId)}
function makePickOrder(size){let a=[];for(let i=0;i<size;i++){a.push({team:"A",player:i});a.push({team:"B",player:i});}return a}

function stopListening(){if(roomId&&listening)roomRef().off();listening=false;}
function syncState(){if(!roomId)return;roomRef().update({phase,timer,settings,playersA,playersB,readyA,readyB,bansA,bansB,picksA,picksB,turn,pickCount,pickOrder});}

function createRoomWithRules(){
  settings={
    teamSize:Number(document.getElementById("teamSizeSelect").value),
    mode:document.getElementById("modeSelect").value,
    banCount:Number(document.getElementById("banCountSelect").value),
    matchType:document.getElementById("matchTypeSelect").value
  };

  stopListening();
  roomId=randomId();
  isHost=true;
  currentTeam="A";
  phase="waiting";timer=0;
  playersA=[myId];playersB=[];readyA=[false];readyB=[];
  bansA=[];bansB=[];picksA=[];picksB=[];
  pickCount=0;turn="A";selectedPick=null;
  pickOrder=makePickOrder(settings.teamSize);

  showOnly("gameScreen");

  roomRef().set({hostId:myId,phase,timer,settings,playersA,playersB,readyA,readyB,bansA,bansB,picksA,picksB,turn,pickCount,pickOrder})
  .then(()=>{listenRoom();renderAll();});
}

function randomId(){
  const c="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";let id="";
  for(let i=0;i<5;i++)id+=c[Math.floor(Math.random()*c.length)];
  return id;
}

function selectJoinTeam(team){
  joinTeam=team;
  document.getElementById("joinTeamA").classList.remove("selectedTeam");
  document.getElementById("joinTeamB").classList.remove("selectedTeam");
  document.getElementById("joinTeam"+team).classList.add("selectedTeam");
  document.getElementById("selectedJoinTeam").innerText=team+"チームを選択中";
  checkJoinReady();
}

function checkJoinReady(){
  const id=document.getElementById("joinRoomId").value.trim();
  document.getElementById("loginButton").disabled=!(id&&joinTeam);
}

function joinRoom(){
  roomId=document.getElementById("joinRoomId").value.trim().toUpperCase();
  if(!roomId||!joinTeam)return alert("ロビーIDとチームを選択してください");

  stopListening();
  currentTeam=joinTeam;
  isHost=false;

  roomRef().once("value").then(s=>{
    if(!s.exists())return alert("ロビーが見つかりません");
    const d=s.val();
    if(d.phase!=="waiting")return alert("このロビーは開始済みです");
    settings=d.settings;
    joinTeamSlot(currentTeam).then(ok=>{
      if(!ok)return;
      showOnly("gameScreen");
      listenRoom();
    });
  });
}

function joinTeamSlot(team){
  const pk=team==="A"?"playersA":"playersB";
  const rk=team==="A"?"readyA":"readyB";

  return roomRef().transaction(room=>{
    if(!room)return room;
    room[pk]=room[pk]||[];
    room[rk]=room[rk]||[];
    if(room[pk].includes(myId))return room;
    if(room[pk].length>=room.settings.teamSize)return;
    room[pk].push(myId);
    room[rk].push(false);
    return room;
  }).then(r=>{
    if(!r.committed){alert("このチームは満員です");return false;}
    const room=r.snapshot.val();
    if(!room[pk].includes(myId)){alert("このチームは満員です");return false;}
    return true;
  });
}

function listenRoom(){
  if(listening)return;
  listening=true;
  roomRef().on("value",s=>{
    const d=s.val();if(!d)return;
    phase=d.phase||"waiting";timer=d.timer||0;settings=d.settings||settings;
    playersA=d.playersA||[];playersB=d.playersB||[];
    readyA=d.readyA||[];readyB=d.readyB||[];
    bansA=d.bansA||[];bansB=d.bansB||[];
    picksA=d.picksA||[];picksB=d.picksB||[];
    turn=d.turn||"A";pickCount=d.pickCount||0;
    pickOrder=d.pickOrder||makePickOrder(settings.teamSize);
    updateMyPlayerIndex();
    renderAll();
  });
}

function updateMyPlayerIndex(){
  const list=currentTeam==="A"?playersA:playersB;
  myPlayerIndex=list.indexOf(myId);
}

function toggleReady(){
  if(myPlayerIndex<0)return;
  if(currentTeam==="A")readyA[myPlayerIndex]=!readyA[myPlayerIndex];
  else readyB[myPlayerIndex]=!readyB[myPlayerIndex];
  syncState();
}

function allJoined(){return playersA.length===settings.teamSize&&playersB.length===settings.teamSize}
function allReady(){
  return allJoined()&&readyA.length===settings.teamSize&&readyB.length===settings.teamSize&&readyA.every(Boolean)&&readyB.every(Boolean);
}

function startCountdown(){
  if(!isHost)return;
  if(!allReady())return alert("全員参加＋全員OKで開始できます");
  phase="countdown";timer=3;syncState();runTimer(startBan);
}

function startBan(){phase="ban";timer=20;syncState();popup("BANピック");runTimer(revealBan);}
function revealBan(){phase="banReveal";syncState();popup("BAN結果表示");setTimeout(()=>{if(isHost)startPick()},3000);}
function startPick(){phase="pick";timer=15;pickCount=0;turn="A";selectedPick=null;pickOrder=makePickOrder(settings.teamSize);syncState();runTimer(autoPick);}
function nextTurn(){
  clearInterval(interval);pickCount++;
  if(pickCount>=pickOrder.length)return endGame();
  turn=pickOrder[pickCount].team;timer=15;selectedPick=null;syncState();runTimer(autoPick);
}
function endGame(){phase="result";timer=0;selectedPick=null;syncState();}

function runTimer(cb){
  clearInterval(interval);
  if(!isHost)return;
  interval=setInterval(()=>{
    timer--;syncState();
    if(timer<=0){clearInterval(interval);cb();}
  },1000);
}

function renderAll(){updateUI();renderTeams();renderFilters();renderPokemon();renderControl();}
function updateUI(){
  document.getElementById("roomId").innerText=roomId?"ロビーID："+roomId:"ロビーID：-----";
  document.getElementById("phase").innerText=phase;
  document.getElementById("timer").innerText=timer;
  document.getElementById("mySeat").innerText=myPlayerIndex>=0?`あなた：チーム${currentTeam} Player${myPlayerIndex+1}`:"あなた：未参加";
}

function renderTeams(){renderTeam("A");renderTeam("B");}
function renderTeam(team){
  const area=document.getElementById(team==="A"?"teamA":"teamB");
  const players=team==="A"?playersA:playersB, ready=team==="A"?readyA:readyB, bans=team==="A"?bansA:bansB, picks=team==="A"?picksA:picksB;
  let html=`<h3>チーム${team}</h3><div class="player banBox"><div>BAN</div><div>${bans.length?bans.join("<br>"):"なし"}</div></div>`;
  for(let i=0;i<settings.teamSize;i++){
    const cur=pickOrder[pickCount];
    const active=phase==="pick"&&cur&&cur.team===team&&cur.player===i;
    const me=currentTeam===team&&myPlayerIndex===i;
    html+=`<div class="player ${active?"active":""} ${me?"me":""} ${ready[i]?"ready":""}">
      <div>Player ${i+1}</div>
      <div>${players[i]?"参加済み":"未参加"} / ${ready[i]?"OK":"未OK"}</div>
      <strong>${picks[i]||"未選択"}</strong>
    </div>`;
  }
  area.innerHTML=html;
}

function renderFilters(){
  document.getElementById("roleFilters").innerHTML=roles.map(r=>`<button class="${currentRole===r?"selectedRole":""}" onclick="setRole('${r}')">${r}</button>`).join("");
}
function setRole(r){currentRole=r;renderAll();}
function setSearchText(){searchText=document.getElementById("searchInput").value.trim();renderPokemon();}

function renderPokemon(){
  const list=pokemon.filter(p=>(currentRole==="All"||p.role===currentRole)&&p.name.includes(searchText));
  document.getElementById("pokemonList").innerHTML=list.map(p=>{
    const name=p.name;
    let blocked=false;
    if(phase==="ban") blocked=currentTeam==="A"?bansA.includes(name):bansB.includes(name);
    else blocked=bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name);
    const action=phase==="ban"?`selectBan('${name}')`:phase==="pick"?`choosePick('${name}')`:"";
    return `<button class="role-${p.role}" style="${blocked?"opacity:.25;":""}${selectedPick===name?"outline:3px solid yellow;":""}" onclick="${action}">${name}</button>`;
  }).join("")||"該当なし";
}

function renderControl(){
  let html="";
  if(phase==="waiting"){
    const ready=myPlayerIndex>=0?(currentTeam==="A"?readyA[myPlayerIndex]:readyB[myPlayerIndex]):false;
    html=`<div>ルール：${settings.teamSize}v${settings.teamSize} / ${settings.mode==="fearless"?"フィアレス":"通常"} / BAN${settings.banCount} / ${settings.matchType}</div>
    <div>人数：A ${playersA.length}/${settings.teamSize}　B ${playersB.length}/${settings.teamSize}</div>
    <button onclick="toggleReady()" ${myPlayerIndex>=0?"":"disabled"}>${ready?"OK解除":"準備OK"}</button>
    <button onclick="startCountdown()" ${isHost&&allReady()?"":"disabled"}>スタート</button>`;
  }
  if(phase==="countdown")html=`<div class="bigPick">開始まで ${timer}</div>`;
  if(phase==="ban")html=`<div>BANフェーズ：各チーム${settings.banCount}体まで</div><div>A ${bansA.length}/${settings.banCount}　B ${bansB.length}/${settings.banCount}</div>`;
  if(phase==="banReveal")html=`<div class="bigPick">BAN結果表示中</div>`;
  if(phase==="pick"){
    const cur=pickOrder[pickCount], mine=cur&&cur.team===currentTeam&&cur.player===myPlayerIndex;
    html=`<div>現在：チーム${cur.team} Player${cur.player+1}</div>
    <div>${mine?"あなたの番です":"待機中"}</div>
    <div class="bigPick">${selectedPick||"未選択"}</div>
    <button onclick="confirmPick()" ${mine&&selectedPick?"":"disabled"}>決定</button>`;
  }
  if(phase==="result")html=`<div class="bigPick">ドラフト完了</div>`;
  document.getElementById("pickControl").innerHTML=html;
}

function selectBan(name){
  if(phase!=="ban"||myPlayerIndex<0)return;
  let bans=currentTeam==="A"?bansA:bansB;
  if(bans.includes(name)){
    if(currentTeam==="A")bansA=bansA.filter(x=>x!==name);else bansB=bansB.filter(x=>x!==name);
  }else{
    if(bans.length>=settings.banCount)return;
    bans.push(name);
  }
  syncState();
}
function choosePick(name){
  if(phase!=="pick")return;
  const cur=pickOrder[pickCount];
  if(!cur||cur.team!==currentTeam||cur.player!==myPlayerIndex)return;
  if(bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name))return;
  selectedPick=name;renderAll();
}
function confirmPick(){
  const cur=pickOrder[pickCount];
  if(!cur||!selectedPick)return;
  if(cur.team==="A")picksA[cur.player]=selectedPick;else picksB[cur.player]=selectedPick;
  selectedPick=null;nextTurn();
}
function autoPick(){
  const cur=pickOrder[pickCount];if(!cur)return;
  const available=pokemon.map(p=>p.name).filter(n=>!bansA.includes(n)&&!bansB.includes(n)&&!picksA.includes(n)&&!picksB.includes(n));
  if(!available.length)return endGame();
  const p=available[Math.floor(Math.random()*available.length)];
  if(cur.team==="A")picksA[cur.player]=p;else picksB[cur.player]=p;
  nextTurn();
}
function popup(text){document.getElementById("popup").innerHTML=`<div class="popupContent"><div class="popupTitle">${text}</div></div>`;document.getElementById("popup").classList.remove("hidden");setTimeout(()=>document.getElementById("popup").classList.add("hidden"),1500);}
function copyRoomId(){navigator.clipboard.writeText(roomId).then(()=>alert("コピーしました："+roomId)).catch(()=>alert(roomId));}

showOnly("homeScreen");
</script>

</body>
</html>
