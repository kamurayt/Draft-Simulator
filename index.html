<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドラフトシミュレーター</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  background: #0b1220;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

select {
  padding: 8px;
  border-radius: 8px;
}

.screen {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.team {
  margin: 10px;
  padding: 10px;
  border: 1px solid white;
}

.pick {
  display: inline-block;
  margin: 5px;
  padding: 8px;
  background: #222;
  border-radius: 6px;
  cursor: pointer;
}

.disabled {
  opacity: 0.3;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- ルール設定 -->
<div id="ruleScreen" class="screen active">
<h1>ルール設定</h1>

<p>人数</p>
<select id="playerCount">
  <option value="3">3v3</option>
  <option value="5">5v5</option>
</select>

<p>形式</p>
<select id="mode">
  <option value="normal">通常ドラフト</option>
  <option value="fearless">フィアレス</option>
</select>

<p>BAN数</p>
<select id="banCount">
  <option>3</option>
  <option>5</option>
  <option>10</option>
</select>

<p>試合形式</p>
<select id="bo">
  <option>BO1</option>
  <option>BO3</option>
</select>

<br><br>
<button onclick="createLobby()">このルールで作成</button>
</div>

<!-- ロビー -->
<div id="lobbyScreen" class="screen">
<h2>ロビー</h2>
<p>ロビーID: <span id="lobbyId"></span></p>

<button onclick="joinTeam('A')">チームA</button>
<button onclick="joinTeam('B')">チームB</button>

<br><br>
<button onclick="readyUp()">OK</button>

<p id="status"></p>

<button id="startBtn" onclick="startDraft()" disabled>開始</button>
</div>

<!-- ドラフト -->
<div id="draftScreen" class="screen">
<h2>ドラフト</h2>

<div class="team">
<h3>チームA</h3>
<div id="teamA"></div>
</div>

<div class="team">
<h3>チームB</h3>
<div id="teamB"></div>
</div>

<h3>ポケモン選択</h3>
<div id="pool"></div>

</div>

<script>
// Firebase設定（←自分のに置き換え）
const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJECT_ID.firebaseapp.com",
  databaseURL: "https://PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lobby = "";
let myTeam = "";
let used = { A: [], B: [] };

// サンプルポケモン
const pokemon = ["ピカチュウ","リザードン","ゲッコウガ","ミュウ","ルカリオ","カビゴン","イーブイ"];

// ロビー作成
function createLobby(){
  lobby = Math.random().toString(36).substring(2,8);
  document.getElementById("lobbyId").innerText = lobby;

  db.ref("lobbies/"+lobby).set({
    players: {},
    ready: {},
    state: "waiting"
  });

  show("lobbyScreen");
  listenLobby();
}

// チーム参加
function joinTeam(team){
  myTeam = team;
  db.ref(`lobbies/${lobby}/players/${Date.now()}`).set(team);
}

// OKボタン
function readyUp(){
  db.ref(`lobbies/${lobby}/ready/${Date.now()}`).set(true);
}

// ロビー監視
function listenLobby(){
  db.ref("lobbies/"+lobby).on("value", snap=>{
    const data = snap.val();
    if(!data) return;

    const readyCount = data.ready ? Object.keys(data.ready).length : 0;
    document.getElementById("status").innerText = "準備人数: "+readyCount;

    if(readyCount >= 2){
      document.getElementById("startBtn").disabled = false;
    }
  });
}

// 開始
function startDraft(){
  db.ref(`lobbies/${lobby}/state`).set("draft");
  show("draftScreen");
  renderPool();
}

// ポケモン表示
function renderPool(){
  const pool = document.getElementById("pool");
  pool.innerHTML = "";

  pokemon.forEach(p=>{
    const div = document.createElement("div");
    div.className = "pick";
    div.innerText = p;

    if(used[myTeam].includes(p)){
      div.classList.add("disabled");
    }

    div.onclick = ()=>{
      pickPokemon(p);
    };

    pool.appendChild(div);
  });
}

// ピック
function pickPokemon(p){
  if(used[myTeam].includes(p)) return;

  used[myTeam].push(p);

  const teamDiv = document.getElementById(myTeam === "A" ? "teamA" : "teamB");

  const el = document.createElement("div");
  el.innerText = p;
  teamDiv.appendChild(el);

  renderPool();
}

// 画面切替
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
