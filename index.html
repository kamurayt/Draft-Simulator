<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#071024;color:white;font-family:sans-serif;text-align:center;min-height:100%}
button{border:none;border-radius:14px;font-weight:800;padding:10px 12px;margin:4px}
button:disabled{opacity:.35}
input,select{border:none;border-radius:14px;padding:10px;margin:6px;font-weight:800}
.hidden{display:none!important}
.screen{min-height:100vh;padding:26px 14px}
h1{font-size:34px;margin:50px 0 30px}
.ruleBox{max-width:330px;margin:14px auto;display:flex;justify-content:space-between;align-items:center;font-size:20px}
.selectedTeam,.selectedRole{background:#fff200!important;color:#000!important}
.appHeader{position:sticky;top:0;z-index:20;background:#071024;border-bottom:1px solid #22304f;padding:8px 10px}
.roomLine{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px}
.phaseCard{margin:8px auto 6px;padding:10px;border-radius:18px;background:#111b38;max-width:520px;border:1px solid #2e3f69}
.phaseMain{font-size:19px;font-weight:900;color:#ffe55c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phaseSub{font-size:13px;color:#b9c7e8;margin-top:3px}
.statusWrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px;background:#071024}
.teamMini{background:#0d1732;border:1px solid #2b3a60;border-radius:16px;padding:8px;text-align:left;min-width:0}
.teamMiniTitle{font-size:13px;font-weight:900;margin-bottom:5px;color:#9ee7ff}
.miniRows{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.miniPlayer{font-size:10px;background:#172240;border-radius:10px;padding:5px;text-align:center;min-height:58px;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden}
.miniPlayer.me{outline:2px solid #58c7ff}
.miniPlayer.active{outline:2px solid #fff200}
.miniPlayer img{width:30px;height:30px;object-fit:contain}
.miniName{font-size:9px;line-height:1.05;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.banArea{margin-top:7px;background:#101b3a;border:1px solid #2f3e68;border-radius:12px;padding:5px}
.banLabel{font-size:10px;font-weight:900;color:#ff9b9b;margin-bottom:3px;letter-spacing:.08em}
.banStrip{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;min-height:34px}
.banIcon{background:#24304e;border-radius:10px;min-height:34px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.banIcon img{width:28px;height:28px;object-fit:contain}
.banHidden{font-size:12px;color:#ff9b9b;font-weight:900}
.banEmpty{font-size:10px;color:#8ea0c8}
.mainArea{padding:8px 10px 132px}
.controlPanel{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#09152e;border-top:1px solid #2e3f69;padding:8px 10px;box-shadow:0 -8px 24px rgba(0,0,0,.35)}
.controlPanel .bigPick{background:#172446;border-radius:14px;padding:8px;margin:4px auto;font-weight:900;max-width:520px}
.controlPanel button{font-size:14px;padding:9px 12px}
.filters{display:flex;gap:6px;overflow-x:auto;padding:6px 0;position:sticky;top:112px;background:#071024;z-index:10}
.filters button{font-size:12px;white-space:nowrap;background:#e8edf8;color:#111}
.searchInput{width:100%;font-size:15px;margin:4px 0 8px}
.pokemonGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pokemonGrid button{min-height:88px;margin:0;padding:6px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:white}
.pokemonGrid img{width:50px;height:50px;object-fit:contain}
.pokeName{font-size:10px;line-height:1.1;font-weight:900}
.role-アタック{background:#ff5c5c;color:#fff}
.role-スピード{background:#b45cff;color:#fff}
.role-バランス{background:#8a5cff;color:#fff}
.role-ディフェンス{background:#5cff7a;color:#000!important}
.role-サポート{background:#ffe45c;color:#000!important}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.popupContent{background:#121d3d;border:2px solid #58c7ff;border-radius:22px;padding:18px;max-width:94vw;max-height:86vh;overflow:auto}
.popupTitle{font-size:26px;font-weight:900;margin-bottom:12px}
.banRevealWrap{display:grid;grid-template-columns:1fr;gap:14px}
.banRevealList{display:grid;grid-template-columns:repeat(5,58px);gap:8px;justify-content:center}
.banRevealCard{background:#1f2a52;border-radius:12px;padding:5px;font-size:9px}
.banRevealCard img{width:42px;height:42px;object-fit:contain}
@media(min-width:650px){
  .pokemonGrid{grid-template-columns:repeat(5,1fr)}
  .banRevealWrap{grid-template-columns:1fr 1fr}

/* ===== character-list focused UI v2 ===== */
html,body{height:100%;overflow:hidden}
#gameScreen{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.appHeader{flex:0 0 auto;padding:8px 10px}
body.draft-active .roomLine{display:none}
body.draft-active .phaseCard{margin:6px auto;padding:10px}
body.draft-active .phaseSub{display:none}
body.draft-active #statusWrap{display:none!important}
.mainArea{flex:1;overflow-y:auto;padding:8px 10px 126px}
body.draft-active .mainArea{padding-top:6px}
.filters{position:sticky;top:0;background:#071024;z-index:10}
.pokemonGrid{grid-template-columns:repeat(4,1fr);gap:10px}
.pokemonGrid button{min-height:104px;border-radius:18px}
.pokemonGrid img{width:60px;height:60px}
.pokeName{font-size:11px}
.controlPanel{padding:8px 10px}
.controlPanel .bigPick{font-size:18px;padding:10px}
.banTeamToggle{display:inline-flex;background:#172446;border-radius:14px;padding:3px;margin:3px}
.banTeamToggle button{margin:0 2px;padding:7px 11px;font-size:13px}
.banTeamToggle .selectedBanTeam{background:#fff200;color:#000}
.statusButton{background:#2b395f;color:white}
.statusOverlay{position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:998;display:flex;align-items:center;justify-content:center;padding:14px}
.statusModal{width:min(640px,96vw);max-height:86vh;overflow:auto;background:#0d1732;border:2px solid #58c7ff;border-radius:20px;padding:12px}
.statusModalTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.statusModalTop h3{margin:0;font-size:18px}
.statusModal .statusWrap{display:grid!important;grid-template-columns:1fr;gap:8px;padding:0;background:transparent}
.statusModal .teamMini{padding:8px}
.statusModal .miniRows{grid-template-columns:repeat(3,1fr)}
.closeBtn{background:#fff;color:#000}
@media(min-width:650px){
  .pokemonGrid{grid-template-columns:repeat(5,1fr)}

}

</style>

<div id="popupBox" class="popup hidden"></div>

<div id="homeScreen" class="screen">

<div id="ruleScreen" class="screen hidden">

</div>

function showOnly(id){["homeScreen","ruleScreen","joinScreen","gameScreen"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}
function showHome(){showOnly("homeScreen")}
function showRuleScreen(){showOnly("ruleScreen")}
function showJoinScreen(){showOnly("joinScreen")}
function roomRef(){return db.ref("rooms/"+roomId)}
function randomId(){const c="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";let id="";for(let i=0;i<5;i++)id+=c[Math.floor(Math.random()*c.length)];return id}
function makePickOrder(size){let a=[];for(let i=0;i<size;i++){a.push({team:"A",player:i});a.push({team:"B",player:i})}return a}
function findPokemon(name){return pokemon.find(p=>p.name===name)}
function normalizeText(t){return (t||"").toLowerCase().replace(/[ァ-ン]/g,s=>String.fromCharCode(s.charCodeAt(0)-0x60))}
function banMode(){return settings.banCount<=3?"alternate":"simultaneous"}
function currentBanTeam(){return banTurn%2===0?"A":"B"}
function canSeeBans(team){return phase==="banReveal"||phase==="pick"||phase==="result"||currentTeam===team}
function updateUI(){
  roomIdText.innerText=roomId?"ロビーID："+roomId:"ロビーID：-----";
  const total=settings.teamSize*2, joined=playersA.length+playersB.length;
  const activeDraft=phase==="ban"||phase==="banReveal"||phase==="pick"||phase==="result";
  document.body.classList.toggle("draft-active",activeDraft);
  let title="待機中";
  if(phase==="ban") title=banMode()==="alternate"?`TEAM ${currentBanTeam()} BAN　残り${timer}秒`:`同時BAN　残り${timer}秒`;
  if(phase==="banReveal") title="BAN公開中";
  if(phase==="pick"){const cur=pickOrder[pickCount];title=cur?`TEAM ${cur.team} P${cur.player+1} PICK　残り${timer}秒`:"PICK中"}
  if(phase==="result") title="ドラフト完了";
  phaseTitle.innerText=title;
  phaseSub.innerText=activeDraft?"":`参加人数：${joined} / ${total}　あなた：${myPlayerIndex>=0?`TEAM ${currentTeam} P${myPlayerIndex+1}`:"未参加"}${testMode?"　テスト中":""}`;
}
function pickedCard(name){const p=findPokemon(name);return p?`<img src="${p.img}" onerror="this.style.display='none'"><div class="miniName">${name}</div>`:`<div class="miniName">${name||"未"}</div>`}
function banIcon(name,idx,bans,team){
  if(!canSeeBans(team)) return `<div class="banIcon">${idx<bans.length?`<span class="banHidden">?</span>`:`<span class="banEmpty">空</span>`}</div>`;
  const p=findPokemon(name);
  return `<div class="banIcon">${p?`<img src="${p.img}" title="${name}" onerror="this.style.display='none'">`:`<span class="banEmpty">空</span>`}</div>`;
}
function renderStatus(){
  const block=(team,players,ready,bans,picks)=>{
    let rows="";
    for(let i=0;i<settings.teamSize;i++){
      const cur=pickOrder[pickCount];
      const active=phase==="pick"&&cur&&cur.team===team&&cur.player===i;
      const me=currentTeam===team&&myPlayerIndex===i;
      rows+=`<div class="miniPlayer ${active?"active":""} ${me?"me":""}">P${i+1} ${players[i]?(ready[i]?"✅":"⏳"):"—"}${pickedCard(picks[i])}</div>`;
    }
    let icons="";
    for(let i=0;i<settings.banCount;i++) icons+=banIcon(bans[i],i,bans,team);
    const countText=canSeeBans(team)?`${bans.length}/${settings.banCount}`:"非公開";
    return `<div class="teamMini"><div class="teamMiniTitle">TEAM ${team}</div><div class="miniRows">${rows}</div><div class="banArea"><div class="banLabel">BAN ${countText}</div><div class="banStrip">${icons}</div></div></div>`;
  };
  statusWrap.innerHTML=block("A",playersA,readyA,bansA,picksA)+block("B",playersB,readyB,bansB,picksB);
}

function buildStatusHtml(){
  return statusWrap.innerHTML;
}
function toggleStatusOverlay(show){
  if(show){
    statusModalContent.innerHTML=`<div class="statusWrap">${buildStatusHtml()}</div>`;
    statusOverlay.classList.remove("hidden");
  }else{
    statusOverlay.classList.add("hidden");
  }
}
function renderFilters(){roleFilters.innerHTML=roles.map(r=>`<button class="${currentRole===r?"selectedRole":""}" onclick="setRole('${r}')">${r}</button>`).join("")}
function setRole(r){currentRole=r;renderAll()}
function setSearchText(){searchText=searchInput.value.trim();renderPokemon()}
function renderPokemon(){
  const q=normalizeText(searchText);
  const filtered=pokemon.filter(p=>(currentRole==="All"||p.role===currentRole)&&(normalizeText(p.name).includes(q)||normalizeText(p.kana).includes(q)));
  pokemonList.innerHTML=filtered.map(p=>{
    const name=p.name;
    const blocked=bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name);
    const action=phase==="ban"?`selectBan('${name}')`:phase==="pick"?`choosePick('${name}')`:"";
    return `<button class="role-${p.role}" style="${blocked?"opacity:.25;":""}${selectedPick===name?"outline:3px solid yellow;":""}" onclick="${action}"><img src="${p.img}" onerror="this.style.display='none'"><span class="pokeName">${p.name}</span></button>`;
  }).join("")||"該当なし";
}
function canControlCurrentPick(){const cur=pickOrder[pickCount];if(!cur)return false;if(testMode&&isHost)return true;return cur.team===currentTeam&&cur.player===myPlayerIndex}
function setBanInputTeam(team){banInputTeam=team;renderAll()}
function canControlBan(){if(phase!=="ban")return false;if(testMode&&isHost)return true;if(banMode()==="alternate")return currentBanTeam()===currentTeam;return currentTeam==="A"||currentTeam==="B"}
function renderControl(){
  let html="";
  if(phase==="waiting"){
    const ready=myPlayerIndex>=0?(currentTeam==="A"?readyA[myPlayerIndex]:readyB[myPlayerIndex]):false;
    html=`<div class="bigPick">ルール：${settings.teamSize}v${settings.teamSize} / ${settings.mode==="fearless"?"フィアレス":"通常"} / BAN${settings.banCount} / ${settings.matchType}</div><button onclick="toggleReady()" ${myPlayerIndex>=0?"":"disabled"}>${ready?"OK解除":"準備OK"}</button><button onclick="startDraft()" ${isHost&&allReady()?"":"disabled"}>スタート</button><button onclick="debugFillRoom()" ${isHost?"":"disabled"}>テスト用</button>`;
  }
  if(phase==="ban"){
    const modeText=banMode()==="alternate"?"交互BAN":"同時BAN";
    let toggle="";
    if(banMode()==="simultaneous"&&testMode&&isHost){
      toggle=`<div class="banTeamToggle"><button class="${banInputTeam==="A"?"selectedBanTeam":""}" onclick="setBanInputTeam('A')">AにBAN</button><button class="${banInputTeam==="B"?"selectedBanTeam":""}" onclick="setBanInputTeam('B')">BにBAN</button></div>`;
    }
    html=`<div class="bigPick">${modeText}　${timer}秒</div>${toggle}<button onclick="finishBan()" ${isHost?"":"disabled"}>BAN確定</button><button class="statusButton" onclick="toggleStatusOverlay(true)">BAN/PICK一覧</button>`;
  }
  if(phase==="banReveal") html=`<div class="bigPick">BAN結果表示中</div><button class="statusButton" onclick="toggleStatusOverlay(true)">BAN/PICK一覧</button>`;
  if(phase==="pick"){const mine=canControlCurrentPick();html=`<div class="bigPick">${selectedPick||"未選択"}</div><button onclick="confirmPick()" ${mine&&selectedPick?"":"disabled"}>決定</button><button class="statusButton" onclick="toggleStatusOverlay(true)">BAN/PICK一覧</button>`}
  if(phase==="result") html=`<div class="bigPick">ドラフト完了</div><button class="statusButton" onclick="toggleStatusOverlay(true)">BAN/PICK一覧</button>`;
  pickControl.innerHTML=html;
}
function renderAll(){updateUI();renderStatus();if(typeof statusOverlay!=="undefined"&&!statusOverlay.classList.contains("hidden"))statusModalContent.innerHTML=`<div class="statusWrap">${buildStatusHtml()}</div>`;renderFilters();renderPokemon();renderControl()}
function createRoomWithRules(){
  settings={teamSize:Number(teamSizeSelect.value),mode:modeSelect.value,banCount:Number(banCountSelect.value),matchType:matchTypeSelect.value};
  stopListening();roomId=randomId();isHost=true;currentTeam="A";phase="waiting";timer=0;testMode=false;banTurn=0;
  playersA=[myId];playersB=[];readyA=[false];readyB=[];bansA=[];bansB=[];picksA=[];picksB=[];pickCount=0;selectedPick=null;pickOrder=makePickOrder(settings.teamSize);
  showOnly("gameScreen");
  roomRef().set({hostId:myId,phase,timer,testMode,banTurn,settings,playersA,playersB,readyA,readyB,bansA,bansB,picksA,picksB,pickCount,pickOrder}).then(()=>{listenRoom();renderAll()});
}
function selectJoinTeam(team){joinTeam=team;joinTeamA.classList.remove("selectedTeam");joinTeamB.classList.remove("selectedTeam");document.getElementById("joinTeam"+team).classList.add("selectedTeam");selectedJoinTeam.innerText=team+"チームを選択中";checkJoinReady()}
function checkJoinReady(){loginButton.disabled=!(joinRoomId.value.trim()&&joinTeam)}
function joinRoom(){
  roomId=joinRoomId.value.trim().toUpperCase();
  if(!roomId||!joinTeam){alert("ロビーIDとチームを選択してください");return}
  stopListening();currentTeam=joinTeam;isHost=false;
  roomRef().once("value").then(s=>{if(!s.exists()){alert("ロビーが見つかりません");return}const d=s.val();if(d.phase!=="waiting"){alert("このロビーは開始済みです");return}settings=d.settings;joinTeamSlot(currentTeam).then(ok=>{if(!ok)return;showOnly("gameScreen");listenRoom()})});
}
function joinTeamSlot(team){
  const pk=team==="A"?"playersA":"playersB", rk=team==="A"?"readyA":"readyB";
  return roomRef().transaction(room=>{if(!room)return room;room[pk]=room[pk]||[];room[rk]=room[rk]||[];if(room[pk].includes(myId))return room;if(room[pk].length>=room.settings.teamSize)return;room[pk].push(myId);room[rk].push(false);return room}).then(r=>{if(!r.committed){alert("このチームは満員です");return false}const room=r.snapshot.val();return room[pk].includes(myId)});
}
function stopListening(){if(roomId&&listening)roomRef().off();clearInterval(interval);listening=false}
function listenRoom(){
  if(listening)return;listening=true;
  roomRef().on("value",s=>{const d=s.val();if(!d)return;const oldPhase=phase;phase=d.phase||"waiting";timer=d.timer||0;testMode=!!d.testMode;banTurn=d.banTurn||0;settings=d.settings||settings;playersA=d.playersA||[];playersB=d.playersB||[];readyA=d.readyA||[];readyB=d.readyB||[];bansA=d.bansA||[];bansB=d.bansB||[];picksA=d.picksA||[];picksB=d.picksB||[];pickCount=d.pickCount||0;pickOrder=d.pickOrder||makePickOrder(settings.teamSize);updateMyPlayerIndex();renderAll();if(phase!==oldPhase){if(phase==="ban")showTextPopup("BANピック");if(phase==="banReveal")showBanRevealPopup()}});
}
function updateMyPlayerIndex(){myPlayerIndex=(currentTeam==="A"?playersA:playersB).indexOf(myId)}
function syncState(extra={}){if(!roomId)return;roomRef().update(Object.assign({phase,timer,testMode,banTurn,settings,playersA,playersB,readyA,readyB,bansA,bansB,picksA,picksB,pickCount,pickOrder},extra))}
function toggleReady(){if(myPlayerIndex<0)return;if(currentTeam==="A")readyA[myPlayerIndex]=!readyA[myPlayerIndex];else readyB[myPlayerIndex]=!readyB[myPlayerIndex];syncState()}
function debugFillRoom(){if(!isHost)return;playersA=[];playersB=[];readyA=[];readyB=[];picksA=[];picksB=[];bansA=[];bansB=[];for(let i=0;i<settings.teamSize;i++){playersA.push(i===0?myId:"debugA"+i);playersB.push("debugB"+i);readyA.push(true);readyB.push(true)}currentTeam="A";myPlayerIndex=0;testMode=true;banTurn=0;syncState()}
function allJoined(){return playersA.length===settings.teamSize&&playersB.length===settings.teamSize}
function allReady(){return allJoined()&&readyA.every(Boolean)&&readyB.every(Boolean)}
function startDraft(){if(!isHost)return;if(!allReady()){alert("全員参加＋全員OKで開始できます");return}phase="ban";timer=20;banTurn=0;syncState();showTextPopup("BANピック");startTimer(()=>autoBanOrFinish())}
function startTimer(callback){clearInterval(interval);if(!isHost)return;interval=setInterval(()=>{timer--;if(timer<=0){timer=0;syncState();clearInterval(interval);callback()}else syncState()},1000)}
function selectBan(name){
  if(!canControlBan())return;
  if(bansA.includes(name)||bansB.includes(name))return;
  if(banMode()==="alternate"){
    const team=currentBanTeam();
    if(team==="A"){if(bansA.length>=settings.banCount)return;bansA.push(name)}
    else{if(bansB.length>=settings.banCount)return;bansB.push(name)}
    banTurn++;
  }else{
    let team=currentTeam;
    if(testMode&&isHost) team=banInputTeam;
    if(team==="A"){if(bansA.length>=settings.banCount)return;bansA.push(name)}
    else if(team==="B"){if(bansB.length>=settings.banCount)return;bansB.push(name)}
  }
  if(bansA.length>=settings.banCount&&bansB.length>=settings.banCount){finishBan();return}
  timer=20;syncState();renderAll();
}
function autoBanOrFinish(){
  if(phase!=="ban")return;
  if(banMode()==="alternate"){
    autoOneBan(currentBanTeam());
    banTurn++;
  }else{
    autoFillTeam("A");
    autoFillTeam("B");
  }
  if(bansA.length>=settings.banCount&&bansB.length>=settings.banCount){finishBan();return}
  timer=20;syncState();startTimer(()=>autoBanOrFinish());
}
function autoOneBan(team){
  const target=team==="A"?bansA:bansB;
  if(target.length>=settings.banCount)return;
  const available=pokemon.map(p=>p.name).filter(n=>!bansA.includes(n)&&!bansB.includes(n)&&!picksA.includes(n)&&!picksB.includes(n));
  if(available.length)target.push(available[Math.floor(Math.random()*available.length)]);
}
function autoFillTeam(team){while((team==="A"?bansA:bansB).length<settings.banCount)autoOneBan(team)}
function finishBan(){if(!isHost)return;clearInterval(interval);phase="banReveal";timer=0;syncState();showBanRevealPopup();setTimeout(()=>{startPick()},2500)}
function startPick(){if(!isHost)return;phase="pick";timer=15;pickCount=0;selectedPick=null;pickOrder=makePickOrder(settings.teamSize);syncState();renderAll();startTimer(()=>autoPick())}
function canControlCurrentPick(){const cur=pickOrder[pickCount];if(!cur)return false;if(testMode&&isHost)return true;return cur.team===currentTeam&&cur.player===myPlayerIndex}
function choosePick(name){if(phase!=="pick")return;if(!canControlCurrentPick())return;if(bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name))return;selectedPick=name;renderAll()}
function confirmPick(){if(phase!=="pick"||!selectedPick||!canControlCurrentPick())return;applyPick(selectedPick)}
function applyPick(name){
  const cur=pickOrder[pickCount];if(!cur)return;
  if(cur.team==="A")picksA[cur.player]=name;else picksB[cur.player]=name;
  selectedPick=null;pickCount++;
  if(pickCount>=pickOrder.length){phase="result";timer=0;clearInterval(interval);syncState();renderAll();return}
  timer=15;syncState();renderAll();startTimer(()=>autoPick());
}
function autoPick(){
  if(phase!=="pick")return;
  const available=pokemon.map(p=>p.name).filter(n=>!bansA.includes(n)&&!bansB.includes(n)&&!picksA.includes(n)&&!picksB.includes(n));
  if(!available.length){phase="result";timer=0;syncState();renderAll();return}
  applyPick(available[Math.floor(Math.random()*available.length)]);
}
function banCards(list){if(!list.length)return `<div>なし</div>`;return list.map(name=>{const p=findPokemon(name);return `<div class="banRevealCard">${p?`<img src="${p.img}" onerror="this.style.display='none'">`:""}<div>${name}</div></div>`}).join("")}
function showBanRevealPopup(){popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">BAN結果</div><div class="banRevealWrap"><div><h3>Aチーム</h3><div class="banRevealList">${banCards(bansA)}</div></div><div><h3>Bチーム</h3><div class="banRevealList">${banCards(bansB)}</div></div></div></div>`;popupBox.classList.remove("hidden");setTimeout(()=>{popupBox.classList.add("hidden")},2500)}
function showTextPopup(text){popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">${text}</div></div>`;popupBox.classList.remove("hidden");setTimeout(()=>{popupBox.classList.add("hidden")},1500)}
function copyRoomId(){navigator.clipboard.writeText(roomId).then(()=>alert("コピーしました："+roomId)).catch(()=>alert(roomId))}
showOnly("homeScreen");
</script>
