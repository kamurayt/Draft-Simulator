<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#071024;color:white;font-family:sans-serif;text-align:center;height:100%;overflow:hidden}
button{border:none;border-radius:14px;font-weight:800;padding:10px 12px;margin:4px}
button:disabled{opacity:.35}
input,select{border:none;border-radius:14px;padding:10px;margin:6px;font-weight:800}
.hidden{display:none!important}
.screen{min-height:100vh;padding:26px 14px}
h1{font-size:34px;margin:50px 0 30px}
.ruleBox{max-width:330px;margin:14px auto;display:flex;justify-content:space-between;align-items:center;font-size:20px}
.selectedTeam,.selectedRole{background:#fff200!important;color:#000!important}
.versionTag{position:fixed;right:6px;top:6px;z-index:999;font-size:9px;opacity:.55;background:#172446;padding:3px 5px;border-radius:8px}
#gameScreen{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.appHeader{flex:0 0 auto;background:#071024;border-bottom:1px solid #22304f;padding:6px 8px}
.roomLine{display:flex;align-items:center;justify-content:center;gap:4px;font-size:12px}
.roomLine button{font-size:12px;padding:5px 8px;border-radius:10px}
.phaseCard{margin:5px auto;padding:8px;border-radius:14px;background:#111b38;max-width:520px;border:1px solid #2e3f69}
.phaseMain{font-size:18px;font-weight:900;color:#ffe55c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phaseSub{font-size:11px;color:#b9c7e8;margin-top:3px}
body.draft-active .roomLine{display:none}
body.draft-active .phaseSub{display:none}
.statusWrap{flex:0 0 auto;padding:5px 8px;background:#071024}
.compactStatus{background:#0d1732;border:1px solid #2b3a60;border-radius:14px;padding:6px;text-align:left}
.compactRow{display:flex;align-items:center;gap:4px;margin:3px 0;overflow:hidden}
.compactLabel{flex:0 0 42px;font-size:10px;font-weight:900;color:#9ee7ff}
.compactSlots{display:flex;gap:4px;flex:1;overflow:hidden}
.compactSlot{min-width:34px;height:34px;background:#172240;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;overflow:hidden;position:relative}
.compactSlot img{width:30px;height:30px;object-fit:contain}
.compactSlot.active{outline:2px solid #fff200}
.compactSlot.me{outline:2px solid #58c7ff}
.compactSlot.tentative{outline:2px solid #ffe55c;opacity:.72}
.compactSlot.tentative:after{content:"選";position:absolute;right:1px;bottom:1px;background:#ffe55c;color:#000;font-size:8px;border-radius:5px;padding:0 2px}
.compactBan{background:#261d34;border:1px solid #53375d}
.compactHidden{color:#ff9b9b;font-size:14px}
.compactEmpty{color:#8491b6}
.teamMini{display:none!important}
body:not(.draft-active) .teamMini{display:block!important;background:#0d1732;border:1px solid #2b3a60;border-radius:16px;padding:10px;text-align:left;min-width:0}
body:not(.draft-active) .statusWrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.teamMiniTitle{font-size:16px;font-weight:900;margin-bottom:8px;color:#9ee7ff}
.miniRows{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}

.miniPlayer.me{outline:2px solid #58c7ff}
body:not(.draft-active) .banArea{display:none!important}
.mainArea{flex:1;overflow-y:auto;padding:6px 10px 112px}

.filters{display:flex;gap:6px;overflow-x:auto;position:sticky;top:0;z-index:10;background:#071024;padding:5px 0}

.searchInput{width:100%;font-size:14px;padding:9px;margin:4px 0 8px}
.pokemonGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}

.pokeName{font-size:11px;line-height:1.1;font-weight:900}
.role-アタック{background:#ff5c5c;color:#fff}
.role-スピード{background:#b45cff;color:#fff}
.role-バランス{background:#8a5cff;color:#fff}

.mainArea{padding-top:4px}
.filters{padding:4px 0}
.searchInput{margin:3px 0 7px;padding:8px}
.controlPanel{padding:6px 10px}

body:not(.draft-active) .controlPanel .bigPick{

body:not(.draft-active) .controlPanel button{

.mainArea{

function saveReconnectInfo(){
  if(!roomId)return;
  localStorage.setItem("lastRoomId",roomId);
  localStorage.setItem("lastTeam",currentTeam||"");
}
function clearReconnectInfo(){
  localStorage.removeItem("lastRoomId");
  localStorage.removeItem("lastTeam");
}
function updateReconnectButtons(){
  const hasRoom=!!localStorage.getItem("lastRoomId");
  const reconnectBtn=document.getElementById("reconnectBtn");
  const resetBtn=document.getElementById("resetStartBtn");
  if(reconnectBtn)reconnectBtn.classList.toggle("hidden",!hasRoom);
  if(resetBtn)resetBtn.classList.toggle("hidden",!hasRoom);
}
function reconnectRoom(){
  const savedRoom=localStorage.getItem("lastRoomId");
  const savedTeam=localStorage.getItem("lastTeam");
  if(!savedRoom||!savedTeam){updateReconnectButtons();return;}
  stopListening();
  roomId=savedRoom;
  currentTeam=savedTeam;
  showOnly("gameScreen");
  listenRoom();
}
function resetSavedRoom(){
  clearReconnectInfo();
  updateReconnectButtons();
  showHome();
}
function leaveRoom(){
  clearReconnectInfo();
  stopListening();
  roomId="";
  currentTeam="";
  myPlayerIndex=-1;
  showHome();
  updateReconnectButtons();
}

function showOnly(id){["homeScreen","startChoiceScreen","ruleScreen","joinScreen","gameScreen"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}
function showHome(){showOnly("homeScreen");updateReconnectButtons()}
function showStartChoice(){clearReconnectInfo();updateReconnectButtons();showOnly("startChoiceScreen")}
function showStartChoice(){clearReconnectInfo();updateReconnectButtons();showOnly("startChoiceScreen")}
function showRuleScreen(){showOnly("ruleScreen")}
function showJoinScreen(){showOnly("joinScreen")}
function roomRef(){return db.ref("rooms/"+roomId)}
function randomId(){const c="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";let id="";for(let i=0;i<5;i++)id+=c[Math.floor(Math.random()*c.length)];return id}
function makePickGroups(size){
  if(size===5){
    return [[{team:"A",player:0}],[{team:"B",player:0},{team:"B",player:1}],[{team:"A",player:1},{team:"A",player:2}],[{team:"B",player:2},{team:"B",player:3}],[{team:"A",player:3},{team:"A",player:4}],[{team:"B",player:4}]];
  }
  let groups=[];for(let i=0;i<size;i++){groups.push([{team:"A",player:i}]);groups.push([{team:"B",player:i}])}return groups;
}
function findPokemon(name){return pokemon.find(p=>p.name===name)}
function normalizeText(t){return (t||"").toLowerCase().replace(/[ァ-ン]/g,s=>String.fromCharCode(s.charCodeAt(0)-0x60))}
function banMode(){return settings.banCount<=3?"alternate":"simultaneous"}
function currentBanTeam(){return banTurn%2===0?"A":"B"}
function canSeeBans(team){return phase==="banReveal"||phase==="pick"||phase==="result"||currentTeam===team||testMode}
function currentGroup(){return pickGroups[pickGroupIndex]||[]}
function groupLabel(){const g=currentGroup();if(!g.length)return "";const team=g[0].team;return `TEAM ${team} ${g.map(x=>`P${x.player+1}`).join("・")}`}
function requiredWins(){
  const mt=String(settings.matchType||"BO1").toUpperCase();
  if(mt.includes("5"))return 3;
  if(mt.includes("3"))return 2;
  return 1;
}
function seriesText(){
  return `GAME ${gameNumber} / ${settings.matchType||"BO1"}　A ${scoreA} - ${scoreB} B`;
}
function scoreStatusText(){
  const need=requiredWins();
  return `先に${need}勝で勝利`;
}

function updateUI(){
  roomIdText.innerText=roomId?"ロビーID："+roomId:"ロビーID：-----";
  const total=settings.teamSize*2, joined=playersA.length+playersB.length;
  const activeDraft=phase==="ban"||phase==="banReveal"||phase==="pick"||phase==="result";
  document.body.classList.toggle("draft-active",activeDraft);
  let title="待機中";
  if(phase==="ban") title=banMode()==="alternate"?`TEAM ${currentBanTeam()} BAN　残り${timer}秒`:`同時BAN　残り${timer}秒`;
  if(phase==="banReveal") title="BAN公開中";
  if(phase==="pick") title=`${groupLabel()} PICK　残り${timer}秒`;
  if(phase==="result") title=seriesWinner?`TEAM ${seriesWinner} シリーズ勝利`:"ドラフト完了";
  phaseTitle.innerText=title;
  phaseSub.innerText=activeDraft?"":`${seriesText()}　${scoreStatusText()}　参加人数：${joined} / ${total}　あなた：${myPlayerIndex>=0?`TEAM ${currentTeam} P${myPlayerIndex+1}`:"未参加"}${testMode?"　テスト中":""}`;
}
function compactIcon(name,fallback="未"){if(!name)return `<span class="compactEmpty">${fallback}</span>`;const p=findPokemon(name);return p?`<img src="${p.img}" title="${name}" onerror="this.style.display='none'">`:`<span>${name.slice(0,1)}</span>`}
function banSlot(name,idx,bans,team){if(!canSeeBans(team))return `<div class="compactSlot compactBan">${idx<bans.length?`<span class="compactHidden">?</span>`:`<span class="compactEmpty">空</span>`}</div>`;return `<div class="compactSlot compactBan">${compactIcon(name,"空")}</div>`}
function pickSlot(team,idx,picks,tentatives){
  const cur=currentGroup().some(x=>x.team===team&&x.player===idx);
  const me=currentTeam===team&&myPlayerIndex===idx;
  const finalPick=picks[idx];
  const temp=tentatives[idx];
  const cls=`compactSlot pickSlot ${cur?"active":""} ${me?"me":""} ${!finalPick&&temp?"tentative":""}`;
  return `<div class="${cls}" title="TEAM ${team} P${idx+1}">${compactIcon(finalPick||temp,`P${idx+1}`)}</div>`;
}
function renderStatus(){
  const activeDraft=phase==="ban"||phase==="banReveal"||phase==="pick"||phase==="result";
  if(!activeDraft){
    const block=(team,players,ready)=>{let rows="";for(let i=0;i<settings.teamSize;i++){const me=currentTeam===team&&myPlayerIndex===i;rows+=`<div class="miniPlayer ${me?"me":""}">P${i+1} ${players[i]?(ready[i]?"✅":"⏳"):"—"}</div>`}return `<div class="teamMini"><div class="teamMiniTitle">TEAM ${team}</div><div class="miniRows">${rows}</div></div>`};
    statusWrap.innerHTML=block("A",playersA,readyA)+block("B",playersB,readyB);return;
  }
  const pickRow=(team,picks,tentatives)=>{let slots="";for(let i=0;i<settings.teamSize;i++)slots+=pickSlot(team,i,picks,tentatives);return `<div class="compactRow"><div class="compactLabel pickLabel">${team} PICK</div><div class="compactSlots pickSlots">${slots}</div></div>`};
  const banRow=(team,bans)=>{let slots="";for(let i=0;i<settings.banCount;i++)slots+=banSlot(bans[i],i,bans,team);const badge=(team==="A"?banReadyA:banReadyB)?`<span class="banConfirmedBadge">確定</span>`:`<span class="banCountBadge">${bans.length}/${settings.banCount}</span>`;return `<div class="compactRow"><div class="compactLabel banLabelTop"><span class="banTitleText">${team} BAN</span>${badge}</div><div class="compactSlots banSlots">${slots}</div></div>`};
  statusWrap.innerHTML=`<div class="compactStatus">${pickRow("A",picksA,tentativeA)}${banRow("A",bansA)}${pickRow("B",picksB,tentativeB)}${banRow("B",bansB)}</div>`;
}

function setRole(r){currentRole=r;renderAll()}
function setSearchText(){searchText=searchInput.value.trim();renderPokemon()}
function renderPokemon(){
  const q=normalizeText(searchText);
  const filtered=pokemon.filter(p=>(currentRole==="All"||p.role===currentRole)&&(normalizeText(p.name).includes(q)||normalizeText(p.kana).includes(q)));
  pokemonList.innerHTML=filtered.map(p=>{const name=p.name;const blocked=bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name);const action=phase==="ban"?`selectBan('${name}')`:phase==="pick"?`choosePick('${name}')`:"";const selected=tentativeA.includes(name)||tentativeB.includes(name)||selectedPick===name;return `<button class="role-${p.role}" style="${blocked?"opacity:.25;":""}${selected?"outline:3px solid yellow;":""}" onclick="${action}"><img src="${p.img}" onerror="this.style.display='none'"><span class="pokeName">${p.name}</span></button>`}).join("")||"該当なし";
}
function canControlBan(){
  if(phase!=="ban")return false;
  if(banMode()==="alternate"){
    if(testMode&&isHost)return true;
    return currentBanTeam()===currentTeam;
  }
  const team=(testMode&&isHost)?banInputTeam:currentTeam;
  if(team==="A"&&banReadyA)return false;
  if(team==="B"&&banReadyB)return false;
  return team==="A"||team==="B";
}
function canControlPickSlot(slot){if(testMode&&isHost)return true;return slot.team===currentTeam&&slot.player===myPlayerIndex}
function myCurrentSlot(){const g=currentGroup();if(testMode&&isHost)return g.find(x=>!(x.team==="A"?picksA[x.player]:picksB[x.player]))||g[0];return g.find(x=>x.team===currentTeam&&x.player===myPlayerIndex)}
function renderControl(){
  let html="";
  if(phase==="waiting"){const ready=myPlayerIndex>=0?(currentTeam==="A"?readyA[myPlayerIndex]:readyB[myPlayerIndex]):false;html=`<div class="bigPick">ルール：${settings.teamSize}v${settings.teamSize} / ${settings.mode==="fearless"?"フィアレス":"通常"} / BAN${settings.banCount} / ${settings.matchType}</div><button onclick="toggleReady()" ${myPlayerIndex>=0?"":"disabled"}>${ready?"OK解除":"準備OK"}</button><button onclick="startDraft()" ${isHost&&allReady()?"":"disabled"}>スタート</button><button onclick="debugFillRoom()" ${isHost?"":"disabled"}>テスト用</button>`}
  if(phase==="ban"){
    const modeText=banMode()==="alternate"?"交互BAN":"同時BAN";
    let toggle="";
    if(banMode()==="simultaneous"&&testMode&&isHost)toggle=`<div class="banTeamToggle"><button class="${banInputTeam==="A"?"selectedBanTeam":""}" onclick="setBanInputTeam('A')">AにBAN</button><button class="${banInputTeam==="B"?"selectedBanTeam":""}" onclick="setBanInputTeam('B')">BにBAN</button></div>`;
    let team=(testMode&&isHost)?banInputTeam:currentTeam;
    const myBans=team==="A"?bansA:bansB;
    const myReady=team==="A"?banReadyA:banReadyB;
    const canConfirm=banMode()==="alternate"?isHost:(myBans.length>=settings.banCount&&!myReady);
    const btnText=banMode()==="alternate"?"BAN確定":(myReady?`${team} 確定済み`:`${team} BAN確定`);
    html=`<div class="bigPick">${modeText}　${timer}秒　${team}:${myBans.length}/${settings.banCount}</div>${toggle}<button onclick="${banMode()==="alternate"?"finishBan()":"confirmBanTeam()"}" ${canConfirm?"":"disabled"}>${btnText}</button>`;
  }
  if(phase==="banReveal")html=`<div class="bigPick">BAN結果表示中</div>`;
  if(phase==="pick"){const slot=myCurrentSlot();html=`<div class="bigPick">選択中：${selectedPick||"未選択"}</div><button onclick="confirmPick()" ${slot&&selectedPick?"":"disabled"}>決定</button>`}
  if(phase==="result"){
    const status=`<div class="matchStatusBox">${seriesText()}<div class="matchStatusSub">${scoreStatusText()}</div></div>`;
    const waitingNext=pendingNextGame||(!seriesWinner&&(scoreA+scoreB)>=gameNumber&&settings.matchType!=="BO1");
    if(seriesWinner){
      html=`${status}<div class="bigPick">TEAM ${seriesWinner} シリーズ勝利</div><button class="seriesEndButton" onclick="showHome()">ホームへ</button>`;
    }else if(waitingNext){
      html=`${status}<button class="nextGameButton" onclick="startNextGame()">次のゲームへ</button>`;
    }else{
      html=`${status}<div class="winButtons"><button onclick="recordGameWin('A')">TEAM A 勝利</button><button onclick="recordGameWin('B')">TEAM B 勝利</button></div>`;
    }
  }else{
      html=`<div class="bigPick">${seriesText()}</div><div class="winButtons"><button onclick="recordGameWin('A')">TEAM A 勝利</button><button onclick="recordGameWin('B')">TEAM B 勝利</button></div>`;
    }
  }
  pickControl.innerHTML=html;
}
function renderAll(){updateUI();renderStatus();renderFilters();renderPokemon();renderControl()}
function createRoomWithRules(){
  settings={teamSize:Number(teamSizeSelect.value),mode:modeSelect.value,banCount:Number(banCountSelect.value),matchType:matchTypeSelect.value};
  stopListening();roomId=randomId();isHost=true;currentTeam="A";phase="waiting";timer=0;testMode=false;banTurn=0;banInputTeam="A";
  gameNumber=1;scoreA=0;scoreB=0;seriesWinner="";pendingNextGame=false;playersA=[myId];playersB=[];readyA=[false];readyB=[];bansA=[];bansB=[];banReadyA=false;banReadyB=false;picksA=[];picksB=[];tentativeA=[];tentativeB=[];pickGroupIndex=0;selectedPick=null;pickGroups=makePickGroups(settings.teamSize);
  showOnly("gameScreen");
  roomRef().set({hostId:myId,phase,timer,testMode,banTurn,banInputTeam,settings,gameNumber,scoreA,scoreB,seriesWinner,pendingNextGame,playersA,playersB,readyA,readyB,bansA,bansB,banReadyA,banReadyB,picksA,picksB,tentativeA,tentativeB,pickGroupIndex,pickGroups}).then(()=>{saveReconnectInfo();updateReconnectButtons();listenRoom();renderAll()});
}
function selectJoinTeam(team){joinTeam=team;joinTeamA.classList.remove("selectedTeam");joinTeamB.classList.remove("selectedTeam");document.getElementById("joinTeam"+team).classList.add("selectedTeam");selectedJoinTeam.innerText=team+"チームを選択中";checkJoinReady()}
function checkJoinReady(){loginButton.disabled=!(joinRoomId.value.trim()&&joinTeam)}
function joinRoom(){roomId=joinRoomId.value.trim().toUpperCase();if(!roomId||!joinTeam){alert("ロビーIDとチームを選択してください");return}stopListening();currentTeam=joinTeam;isHost=false;roomRef().once("value").then(s=>{if(!s.exists()){alert("ロビーが見つかりません");return}const d=s.val();if(d.phase!=="waiting"){alert("このロビーは開始済みです");return}settings=d.settings;joinTeamSlot(currentTeam).then(ok=>{if(!ok)return;saveReconnectInfo();updateReconnectButtons();showOnly("gameScreen");listenRoom()})})}
function joinTeamSlot(team){const pk=team==="A"?"playersA":"playersB",rk=team==="A"?"readyA":"readyB";return roomRef().transaction(room=>{if(!room)return room;room[pk]=room[pk]||[];room[rk]=room[rk]||[];if(room[pk].includes(myId))return room;if(room[pk].length>=room.settings.teamSize)return;room[pk].push(myId);room[rk].push(false);return room}).then(r=>{if(!r.committed){alert("このチームは満員です");return false}const room=r.snapshot.val();return room[pk].includes(myId)})}
function stopListening(){if(roomId&&listening)roomRef().off();clearInterval(interval);listening=false}
function listenRoom(){if(listening)return;listening=true;roomRef().on("value",s=>{const d=s.val();if(!d)return;const oldPhase=phase;phase=d.phase||"waiting";timer=d.timer||0;testMode=!!d.testMode;banTurn=d.banTurn||0;banInputTeam=d.banInputTeam||"A";settings=d.settings||settings;gameNumber=d.gameNumber||1;scoreA=d.scoreA||0;scoreB=d.scoreB||0;seriesWinner=d.seriesWinner||"";pendingNextGame=!!d.pendingNextGame;playersA=d.playersA||[];playersB=d.playersB||[];readyA=d.readyA||[];readyB=d.readyB||[];bansA=d.bansA||[];bansB=d.bansB||[];banReadyA=!!d.banReadyA;banReadyB=!!d.banReadyB;picksA=d.picksA||[];picksB=d.picksB||[];tentativeA=d.tentativeA||[];tentativeB=d.tentativeB||[];pickGroupIndex=d.pickGroupIndex||0;pickGroups=d.pickGroups||makePickGroups(settings.teamSize);updateMyPlayerIndex();renderAll();if(phase!==oldPhase){if(phase==="ban")showTextPopup("BANピック");if(phase==="banReveal")showBanRevealPopup()}})}
function updateMyPlayerIndex(){myPlayerIndex=(currentTeam==="A"?playersA:playersB).indexOf(myId)}
function syncState(extra={}){if(!roomId)return;roomRef().update(Object.assign({phase,timer,testMode,banTurn,banInputTeam,settings,gameNumber,scoreA,scoreB,seriesWinner,pendingNextGame,playersA,playersB,readyA,readyB,bansA,bansB,banReadyA,banReadyB,picksA,picksB,tentativeA,tentativeB,pickGroupIndex,pickGroups},extra))}
function toggleReady(){if(myPlayerIndex<0)return;if(currentTeam==="A")readyA[myPlayerIndex]=!readyA[myPlayerIndex];else readyB[myPlayerIndex]=!readyB[myPlayerIndex];syncState()}
function debugFillRoom(){if(!isHost)return;playersA=[];playersB=[];readyA=[];readyB=[];picksA=[];picksB=[];tentativeA=[];tentativeB=[];bansA=[];bansB=[];banReadyA=false;banReadyB=false;for(let i=0;i<settings.teamSize;i++){playersA.push(i===0?myId:"debugA"+i);playersB.push("debugB"+i);readyA.push(true);readyB.push(true)}currentTeam="A";myPlayerIndex=0;testMode=true;banTurn=0;syncState()}
function allJoined(){return playersA.length===settings.teamSize&&playersB.length===settings.teamSize}
function allReady(){return allJoined()&&readyA.every(Boolean)&&readyB.every(Boolean)}
function setBanInputTeam(team){banInputTeam=team;syncState();renderAll()}
function startDraft(){if(!isHost)return;if(!allReady()){alert("全員参加＋全員OKで開始できます");return}phase="ban";timer=20;banTurn=0;banReadyA=false;banReadyB=false;syncState();showTextPopup("BANピック");startTimer(()=>autoBanOrFinish())}
function startTimer(callback){clearInterval(interval);if(!isHost)return;interval=setInterval(()=>{timer--;if(timer<=0){timer=0;syncState();clearInterval(interval);callback()}else syncState()},1000)}
function selectBan(name){if(!canControlBan())return;if(bansA.includes(name)||bansB.includes(name))return;if(banMode()==="alternate"){const team=currentBanTeam();if(team==="A"){if(bansA.length>=settings.banCount)return;bansA.push(name)}else{if(bansB.length>=settings.banCount)return;bansB.push(name)}banTurn++}else{let team=currentTeam;if(testMode&&isHost)team=banInputTeam;if(team==="A"){if(bansA.length>=settings.banCount)return;bansA.push(name)}else if(team==="B"){if(bansB.length>=settings.banCount)return;bansB.push(name)}}if(banMode()==="alternate"&&(banTurn>=settings.banCount*2||bansA.length>=settings.banCount&&bansB.length>=settings.banCount)){
  finishBan();
  return;
}
syncState();renderAll()}

function confirmBanTeam(){
  if(phase!=="ban"||banMode()==="alternate")return;
  let team=(testMode&&isHost)?banInputTeam:currentTeam;
  if(team==="A"){
    if(bansA.length<settings.banCount)return;
    banReadyA=true;
  }else if(team==="B"){
    if(bansB.length<settings.banCount)return;
    banReadyB=true;
  }
  syncState();
  if(banReadyA&&banReadyB)finishBan();
  else renderAll();
}
function autoBanOrFinish(){
  if(phase!=="ban")return;

  // 3BAN以下の交互BAN：時間切れならそのターンは未BANのまま次へ進む
  if(banMode()==="alternate"){
    banTurn++;
    if(banTurn>=settings.banCount*2||bansA.length>=settings.banCount&&bansB.length>=settings.banCount){
      finishBan();
      return;
    }
    timer=20;
    syncState();
    startTimer(()=>autoBanOrFinish());
    return;
  }

  // 4BAN以上の同時BAN：時間切れなら現在選んでいるBANだけで確定。補完はしない
  banReadyA=true;
  banReadyB=true;
  syncState();
  finishBan();
}
function autoOneBan(team){const target=team==="A"?bansA:bansB;if(target.length>=settings.banCount)return;const available=pokemon.map(p=>p.name).filter(n=>!bansA.includes(n)&&!bansB.includes(n)&&!picksA.includes(n)&&!picksB.includes(n));if(available.length)target.push(available[Math.floor(Math.random()*available.length)])}
function autoFillTeam(team){while((team==="A"?bansA:bansB).length<settings.banCount)autoOneBan(team)}
function finishBan(){if(!isHost)return;clearInterval(interval);phase="banReveal";timer=0;syncState();showBanRevealPopup();setTimeout(()=>{startPick()},2500)}
function startPick(){if(!isHost)return;phase="pick";timer=15;pickGroupIndex=0;selectedPick=null;tentativeA=[];tentativeB=[];pickGroups=makePickGroups(settings.teamSize);syncState();renderAll();startTimer(()=>autoPickGroup())}
function choosePick(name){if(phase!=="pick")return;if(bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name)||tentativeA.includes(name)||tentativeB.includes(name))return;const slot=myCurrentSlot();if(!slot)return;selectedPick=name;if(slot.team==="A")tentativeA[slot.player]=name;else tentativeB[slot.player]=name;syncState();renderAll()}
function confirmPick(){if(phase!=="pick"||!selectedPick)return;const slot=myCurrentSlot();if(!slot)return;if(slot.team==="A")picksA[slot.player]=selectedPick;else picksB[slot.player]=selectedPick;selectedPick=null;syncState();checkGroupComplete()}
function checkGroupComplete(){const done=currentGroup().every(s=>s.team==="A"?picksA[s.player]:picksB[s.player]);if(done)nextPickGroup();else renderAll()}
function nextPickGroup(){pickGroupIndex++;selectedPick=null;if(pickGroupIndex>=pickGroups.length){phase="result";timer=0;clearInterval(interval);syncState();renderAll();return}timer=15;syncState();renderAll();startTimer(()=>autoPickGroup())}
function autoPickGroup(){if(phase!=="pick")return;currentGroup().forEach(slot=>{const arr=slot.team==="A"?picksA:picksB;if(arr[slot.player])return;const available=pokemon.map(p=>p.name).filter(n=>!bansA.includes(n)&&!bansB.includes(n)&&!picksA.includes(n)&&!picksB.includes(n)&&!tentativeA.includes(n)&&!tentativeB.includes(n));if(available.length){const p=available[Math.floor(Math.random()*available.length)];arr[slot.player]=p;if(slot.team==="A")tentativeA[slot.player]=p;else tentativeB[slot.player]=p}});nextPickGroup()}
function recordGameWin(team){
  if(phase!=="result"||seriesWinner||pendingNextGame)return;
  if(team==="A")scoreA++;else scoreB++;
  const need=requiredWins();

  if(scoreA>=need||scoreB>=need){
    seriesWinner=scoreA>=need?"A":"B";
    pendingNextGame=false;
    syncState();
    renderAll();
    return;
  }

  pendingNextGame=true;
  syncState();
  showNextGamePrompt();
  renderAll();
}
function showNextGamePrompt(){
  popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">GAME ${gameNumber} 終了</div><div style="margin:12px 0;font-weight:900">${seriesText()}</div><div style="font-size:13px;color:#b9c7e8;margin-bottom:12px">${scoreStatusText()}</div><button class="nextGameButton" onclick="startNextGame()">次のゲームへ</button></div>`;
  popupBox.classList.remove("hidden");
}
function startNextGame(){
  popupBox.classList.add("hidden");
  if(!isHost&&!testMode){
    alert("ホストが次のゲームを開始してください");
    return;
  }
  gameNumber++;
  pendingNextGame=false;
  phase="waiting";
  timer=0;
  banTurn=0;
  banReadyA=false;
  banReadyB=false;
  bansA=[];
  bansB=[];
  picksA=[];
  picksB=[];
  tentativeA=[];
  tentativeB=[];
  pickGroupIndex=0;
  selectedPick=null;
  readyA=playersA.map(()=>false);
  readyB=playersB.map(()=>false);
  pickGroups=makePickGroups(settings.teamSize);
  syncState();
  renderAll();
}

function banCards(list){if(!list.length)return `<div>なし</div>`;return list.map(name=>{const p=findPokemon(name);return `<div class="banRevealCard">${p?`<img src="${p.img}" onerror="this.style.display='none'">`:""}<div>${name}</div></div>`}).join("")}
function showBanRevealPopup(){popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">BAN結果</div><div class="banRevealWrap"><div><h3>Aチーム</h3><div class="banRevealList">${banCards(bansA)}</div></div><div><h3>Bチーム</h3><div class="banRevealList">${banCards(bansB)}</div></div></div></div>`;popupBox.classList.remove("hidden");setTimeout(()=>{popupBox.classList.add("hidden")},2500)}
function showTextPopup(text){popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">${text}</div></div>`;popupBox.classList.remove("hidden");setTimeout(()=>{popupBox.classList.add("hidden")},1500)}
function copyRoomId(){navigator.clipboard.writeText(roomId).then(()=>alert("コピーしました："+roomId)).catch(()=>alert(roomId))}
showOnly("homeScreen");updateReconnectButtons();
</script>
