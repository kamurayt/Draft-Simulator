function renderControl(){let html="";if(phase==="waiting"){const ready=myPlayerIndex>=0?(currentTeam==="A"?readyA[myPlayerIndex]:readyB[myPlayerIndex]):false;html=`<div>ルール：${settings.teamSize}v${settings.teamSize} / ${settings.mode==="fearless"?"フィアレス":"通常"} / BAN${settings.banCount} / ${settings.matchType}</div><div>人数：A ${playersA.length}/${settings.teamSize}　B ${playersB.length}/${settings.teamSize}</div><button onclick="toggleReady()" ${myPlayerIndex>=0?"":"disabled"}>${ready?"OK解除":"準備OK"}</button><button onclick="startDraft()" ${isHost&&allReady()?"":"disabled"}>スタート</button><button onclick="debugFillRoom()" ${isHost?"":"disabled"}>テスト用：全員参加OK</button><div>${isHost?"全員OKでスタートできます":"ホストの開始を待っています"}</div>`}if(phase==="ban"){html=`<div>BANフェーズ：各チーム${settings.banCount}体まで</div><div>A ${bansA.length}/${settings.banCount}　B ${bansB.length}/${settings.banCount}</div><div class="bigPick">残り ${timer} 秒</div><button onclick="finishBan()" ${isHost?"":"disabled"}>BAN確定</button>`}if(phase==="banReveal")html=`<div class="bigPick">BAN結果表示中</div>`;if(phase==="pick"){const cur=pickOrder[pickCount],mine=cur&&cur.team===currentTeam&&cur.player===myPlayerIndex;html=`<div>現在：チーム${cur.team} Player${cur.player+1}</div><div>${mine?"あなたの番です":"待機中"}</div><div class="bigPick">${selectedPick||"未選択"}</div><button onclick="confirmPick()" ${mine&&selectedPick?"":"disabled"}>決定</button>`}if(phase==="result")html=`<div class="bigPick">ドラフト完了</div>`;pickControl.innerHTML=html}
function renderAll(){updateUI();renderFilters();renderPokemon();renderTeams();renderControl()}
function createRoomWithRules(){settings={teamSize:Number(teamSizeSelect.value),mode:modeSelect.value,banCount:Number(banCountSelect.value),matchType:matchTypeSelect.value};stopListening();roomId=randomId();isHost=true;currentTeam="A";phase="waiting";timer=0;playersA=[myId];playersB=[];readyA=[false];readyB=[];bansA=[];bansB=[];picksA=[];picksB=[];pickCount=0;selectedPick=null;pickOrder=makePickOrder(settings.teamSize);showOnly("gameScreen");roomRef().set({hostId:myId,phase,timer,settings,playersA,playersB,readyA,readyB,bansA,bansB,picksA,picksB,pickCount,pickOrder}).then(()=>{listenRoom();renderAll()})}
function selectJoinTeam(team){joinTeam=team;joinTeamA.classList.remove("selectedTeam");joinTeamB.classList.remove("selectedTeam");document.getElementById("joinTeam"+team).classList.add("selectedTeam");selectedJoinTeam.innerText=team+"チームを選択中";checkJoinReady()}function checkJoinReady(){loginButton.disabled=!(joinRoomId.value.trim()&&joinTeam)}
function joinRoom(){roomId=joinRoomId.value.trim().toUpperCase();if(!roomId||!joinTeam){alert("ロビーIDとチームを選択してください");return}stopListening();currentTeam=joinTeam;isHost=false;roomRef().once("value").then(s=>{if(!s.exists()){alert("ロビーが見つかりません");return}const d=s.val();if(d.phase!=="waiting"){alert("このロビーは開始済みです");return}settings=d.settings;joinTeamSlot(currentTeam).then(ok=>{if(!ok)return;showOnly("gameScreen");listenRoom()})})}
function joinTeamSlot(team){const pk=team==="A"?"playersA":"playersB",rk=team==="A"?"readyA":"readyB";return roomRef().transaction(room=>{if(!room)return room;room[pk]=room[pk]||[];room[rk]=room[rk]||[];if(room[pk].includes(myId))return room;if(room[pk].length>=room.settings.teamSize)return;room[pk].push(myId);room[rk].push(false);return room}).then(r=>{if(!r.committed){alert("このチームは満員です");return false}const room=r.snapshot.val();return room[pk].includes(myId)})}
function stopListening(){if(roomId&&listening)roomRef().off();listening=false}
function listenRoom(){if(listening)return;listening=true;roomRef().on("value",s=>{const d=s.val();if(!d)return;const oldPhase=phase;phase=d.phase||"waiting";timer=d.timer||0;settings=d.settings||settings;playersA=d.playersA||[];playersB=d.playersB||[];readyA=d.readyA||[];readyB=d.readyB||[];bansA=d.bansA||[];bansB=d.bansB||[];picksA=d.picksA||[];picksB=d.picksB||[];pickCount=d.pickCount||0;pickOrder=d.pickOrder||makePickOrder(settings.teamSize);updateMyPlayerIndex();renderAll();if(phase!==oldPhase){if(phase==="ban")showTextPopup("BANピック");if(phase==="banReveal")showBanRevealPopup()}})}
function updateMyPlayerIndex(){myPlayerIndex=(currentTeam==="A"?playersA:playersB).indexOf(myId)}function syncState(){if(!roomId)return;roomRef().update({phase,timer,settings,playersA,playersB,readyA,readyB,bansA,bansB,picksA,picksB,pickCount,pickOrder})}
function toggleReady(){if(myPlayerIndex<0)return;if(currentTeam==="A")readyA[myPlayerIndex]=!readyA[myPlayerIndex];else readyB[myPlayerIndex]=!readyB[myPlayerIndex];syncState()}
function debugFillRoom(){if(!isHost)return;playersA=[];playersB=[];readyA=[];readyB=[];picksA=[];picksB=[];bansA=[];bansB=[];for(let i=0;i<settings.teamSize;i++){playersA.push(i===0?myId:"debugA"+i);playersB.push("debugB"+i);readyA.push(true);readyB.push(true)}currentTeam="A";myPlayerIndex=0;syncState()}
function allJoined(){return playersA.length===settings.teamSize&&playersB.length===settings.teamSize}function allReady(){return allJoined()&&readyA.every(Boolean)&&readyB.every(Boolean)}
function startDraft(){if(!isHost)return;if(!allReady()){alert("全員参加＋全員OKで開始できます");return}phase="ban";timer=20;syncState();showTextPopup("BANピック");startTimer(()=>finishBan())}
function startTimer(callback){clearInterval(interval);if(!isHost)return;interval=setInterval(()=>{timer--;if(timer<=0){timer=0;syncState();clearInterval(interval);callback()}else syncState()},1000)}
function selectBan(name){if(phase!=="ban")return;let bans=currentTeam==="A"?bansA:bansB;if(bans.includes(name))bans=bans.filter(x=>x!==name);else{if(bans.length>=settings.banCount)return;bans.push(name)}if(currentTeam==="A")bansA=bans;else bansB=bans;syncState();renderAll()}
function finishBan(){if(!isHost)return;clearInterval(interval);phase="banReveal";timer=0;syncState();showBanRevealPopup();setTimeout(()=>{startPick()},2500)}
function startPick(){if(!isHost)return;phase="pick";timer=15;pickCount=0;selectedPick=null;pickOrder=makePickOrder(settings.teamSize);syncState();renderAll()}
function choosePick(name){if(phase!=="pick")return;const cur=pickOrder[pickCount];if(!cur)return;if(cur.team!==currentTeam||cur.player!==myPlayerIndex)return;if(bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name))return;selectedPick=name;renderAll()}
function confirmPick(){const cur=pickOrder[pickCount];if(!cur||!selectedPick)return;if(cur.team==="A")picksA[cur.player]=selectedPick;else picksB[cur.player]=selectedPick;selectedPick=null;pickCount++;if(pickCount>=pickOrder.length){phase="result";timer=0}else timer=15;syncState();renderAll()}
function banCards(list){if(!list.length)return`<div>なし</div>`;return list.map(name=>{const p=findPokemon(name);return`<div class="banRevealCard">${p?`<img src="${p.img}" onerror="this.style.display='none'">`:""}<div>${name}</div></div>`}).join("")}
function showBanRevealPopup(){popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">BAN結果</div><div class="banRevealWrap"><div class="banRevealTeam"><h3>Aチーム</h3><div class="banRevealList">${banCards(bansA)}</div></div><div class="banRevealTeam"><h3>Bチーム</h3><div class="banRevealList">${banCards(bansB)}</div></div></div></div>`;popupBox.classList.remove("hidden");setTimeout(()=>{popupBox.classList.add("hidden")},2500)}
function showTextPopup(text){popupBox.innerHTML=`<div class="popupContent"><div class="popupTitle">${text}</div></div>`;popupBox.classList.remove("hidden");setTimeout(()=>{popupBox.classList.add("hidden")},1500)}
function copyRoomId(){navigator.clipboard.writeText(roomId).then(()=>alert("コピーしました："+roomId)).catch(()=>alert(roomId))}
showOnly("homeScreen");
</script>
</body>
</html>
