<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{margin:0;background:#080d1a;color:white;font-family:sans-serif;text-align:center}
button{margin:4px;padding:9px 12px;border-radius:10px;border:none;font-weight:bold}
button:disabled{opacity:.35}
input,select{padding:10px;border-radius:10px;border:none;margin:7px;font-weight:bold}
.hidden{display:none!important}
.screen{min-height:100vh;padding:30px 15px}
h1{font-size:38px;margin-top:70px}
.ruleBox{max-width:320px;margin:15px auto;display:flex;justify-content:space-between;align-items:center;font-size:20px}
.selectedTeam,.selectedRole{background:yellow!important;color:black!important}
.top{padding:8px;background:#080d1a;border-bottom:1px solid #26304a;position:sticky;top:0;z-index:5}
.layout{display:grid;grid-template-columns:.85fr 2.3fr .85fr;gap:5px;padding:5px;height:calc(100vh - 120px)}
.team{display:flex;flex-direction:column;gap:6px}
.player{border:2px solid #444;border-radius:10px;background:#141b2f;padding:7px 3px;font-size:11px;min-height:50px}
.me{border-color:#5ecbff;box-shadow:0 0 12px #5ecbff}
.ready{border-color:#6dff91}
.active{border-color:yellow!important;box-shadow:0 0 15px yellow!important}
.banBox{background:#202846}
.centerBox{border:2px solid #334;border-radius:14px;background:#10172a;padding:6px;display:flex;flex-direction:column;min-height:0}
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:3px}
.filters button{font-size:10px;padding:6px}
.searchInput{width:92%;margin:5px auto}
.pokemonScroll{flex:1;overflow-y:auto;border:1px solid #2f3a5a;border-radius:12px;padding:6px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;align-content:start}
.pokemonScroll button{width:100%;min-height:76px;font-size:9px;padding:4px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.pokemonScroll img{width:42px;height:42px;object-fit:contain;border-radius:8px;background:rgba(255,255,255,.1)}
.pokeName{line-height:1.1}
.role-アタック{background:#ff5c5c;color:white}
.role-バランス{background:#b76cff;color:white}
.role-スピード{background:#4db8ff;color:white}
.role-ディフェンス{background:#5cff7a;color:black}
.role-サポート{background:#ffe45c;color:black}
.pickControl{border-top:1px solid #2f3a5a;margin-top:6px;padding-top:6px;font-size:13px}
.bigPick{background:#1f2a44;border-radius:12px;padding:10px;margin:5px;font-size:17px;font-weight:bold}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center}
.popupContent{background:#142456;border:3px solid #5ecbff;border-radius:16px;padding:25px}
.popupTitle{font-size:26px;font-weight:bold}
</style>
</head>

<body>

<div id="popup" class="popup hidden"></div>

<div id="homeScreen" class="screen">
  <h1>ドラフトシミュレーター</h1>
  <button onclick="showRuleScreen()">ロビーを作る</button>
  <button onclick="showJoinScreen()">ロビーに入る</button>
</div>

<div id="ruleScreen" class="screen hidden">
  <h2>ルール設定</h2>

  <div class="ruleBox">
    <span>人数</span>
    <select id="teamSizeSelect">
      <option value="3">3v3</option>
      <option value="5">5v5</option>
    </select>
  </div>

  <div class="ruleBox">
    <span>形式</span>
    <select id="modeSelect">
      <option value="normal">通常ドラフト</option>
      <option value="fearless">フィアレスドラフト</option>
    </select>
  </div>

  <div class="ruleBox">
    <span>BAN数</span>
    <select id="banCountSelect">
      <option value="3">3体</option>
      <option value="4">4体</option>
      <option value="5" selected>5体</option>
      <option value="6">6体</option>
      <option value="7">7体</option>
      <option value="8">8体</option>
      <option value="9">9体</option>
      <option value="10">10体</option>
    </select>
  </div>

  <div class="ruleBox">
    <span>試合形式</span>
    <select id="matchTypeSelect">
      <option value="BO1">BO1</option>
      <option value="BO3">BO3</option>
      <option value="BO5">BO5</option>
    </select>
  </div>

  <button onclick="createRoomWithRules()">このルールで作成</button>
  <button onclick="showHome()">戻る</button>
</div>

<div id="joinScreen" class="screen hidden">
  <h2>ロビーに入る</h2>

  <input id="joinRoomId" placeholder="ロビーIDを入力" maxlength="5" oninput="checkJoinReady()">

  <div>
    <button id="joinTeamA" onclick="selectJoinTeam('A')">Aチーム</button>
    <button id="joinTeamB" onclick="selectJoinTeam('B')">Bチーム</button>
  </div>

  <div id="selectedJoinTeam">チーム未選択</div>

  <button id="loginButton" onclick="joinRoom()" disabled>ログイン</button>
  <button onclick="showHome()">戻る</button>
</div>

<div id="gameScreen" class="hidden">
  <div class="top">
    <div>
      <span id="roomIdText">ロビーID：-----</span>
      <button onclick="copyRoomId()">コピー</button>
    </div>
    <div>
      <span id="playerCountText">参加人数：0 / 0</span>
    </div>
    <div id="mySeat">あなた：未参加</div>
  </div>

  <div class="layout">
    <div id="teamA" class="team"></div>

    <div class="centerBox">
      <div id="roleFilters" class="filters"></div>
      <input id="searchInput" class="searchInput" placeholder="キャラ名/ひらがな検索" oninput="setSearchText()">
      <div id="pokemonList" class="pokemonScroll"></div>
      <div id="pickControl" class="pickControl"></div>
    </div>

    <div id="teamB" class="team"></div>
  </div>
</div>

const roles=["All","アタック","スピード","バランス","ディフェンス","サポート"];

function showOnly(id){
  ["homeScreen","ruleScreen","joinScreen","gameScreen"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function showHome(){showOnly("homeScreen")}
function showRuleScreen(){showOnly("ruleScreen")}
function showJoinScreen(){showOnly("joinScreen")}

function roomRef(){
  return db.ref("rooms/"+roomId)
}

function makePickOrder(size){
  let a=[];
  for(let i=0;i<size;i++){
    a.push({team:"A",player:i});
    a.push({team:"B",player:i});
  }
  return a;
}

function updateUI(){
  roomIdText.innerText=roomId
    ? "ロビーID："+roomId
    : "ロビーID：-----";

  const total=settings.teamSize*2;
  const joined=playersA.length+playersB.length;

  playerCountText.innerText=`参加人数：${joined} / ${total}`;

  mySeat.innerText=myPlayerIndex>=0
    ? `あなた：チーム${currentTeam} Player${myPlayerIndex+1}`
    : "あなた：未参加";
}

function renderFilters(){
  roleFilters.innerHTML=roles.map(r=>`

      class="${currentRole===r?"selectedRole":""}"
      onclick="setRole('${r}')"
    >

    </button>
  `).join("");
}

function setRole(r){
  currentRole=r;
  renderPokemon();
  renderFilters();
}

function setSearchText(){
  searchText=searchInput.value.trim();
  renderPokemon();
}

function normalizeText(t){
  return (t||"")
    .toLowerCase()
    .replace(/[ァ-ン]/g,s=>
      String.fromCharCode(s.charCodeAt(0)-0x60)
    );
}

function renderPokemon(){
  const q=normalizeText(searchText);

  const filtered=pokemon.filter(p=>
    (currentRole==="All"||p.role===currentRole)&&
    (normalizeText(p.name).includes(q)||normalizeText(p.kana).includes(q))
  );

  pokemonList.innerHTML=filtered.map(p=>{
    const name=p.name;

    let blocked=false;
    if(phase==="ban"){
      blocked=currentTeam==="A"?bansA.includes(name):bansB.includes(name);
    }else{
      blocked=bansA.includes(name)||bansB.includes(name)||picksA.includes(name)||picksB.includes(name);
    }

    const action=phase==="ban"
      ? `selectBan('${name}')`
      : phase==="pick"
        ? `choosePick('${name}')`
        : "";

    return `
      <button
        class="role-${p.role}"
        style="${blocked?"opacity:.25;":""}${selectedPick===name?"outline:3px solid yellow;":""}"
        onclick="${action}"
      >
        <img src="${p.img}" onerror="this.style.display='none'">
        <span class="pokeName">${p.name}</span>
      </button>
    `;
  }).join("")||"該当なし";
}

function renderTeams(){
  renderTeam("A");
  renderTeam("B");
}

function renderTeam(team){
  const area=document.getElementById(team==="A"?"teamA":"teamB");
  const players=team==="A"?playersA:playersB;
  const ready=team==="A"?readyA:readyB;
  const bans=team==="A"?bansA:bansB;
  const picks=team==="A"?picksA:picksB;

  let html=`<h3>チーム${team}</h3>`;

  html+=`
    <div class="player banBox">
      <div>BAN</div>
      <div>${bans.length?bans.join("<br>"):"なし"}</div>
    </div>
  `;

  for(let i=0;i<settings.teamSize;i++){
    const current=pickOrder[pickCount];
    const active=phase==="pick"&&current&&current.team===team&&current.player===i;
    const me=currentTeam===team&&myPlayerIndex===i;

    html+=`
      <div class="player ${active?"active":""} ${me?"me":""} ${ready[i]?"ready":""}">
        <div>Player ${i+1}</div>
        <div>${players[i]?"参加済み":"未参加"} / ${ready[i]?"OK":"未OK"}</div>
        <strong>${picks[i]||"未選択"}</strong>
      </div>
    `;
  }

  area.innerHTML=html;
}

function renderControl(){
  let html="";

  if(phase==="waiting"){
    const ready=myPlayerIndex>=0
      ? currentTeam==="A"?readyA[myPlayerIndex]:readyB[myPlayerIndex]
      : false;

    html=`
      <div>ルール：${settings.teamSize}v${settings.teamSize} / ${settings.mode==="fearless"?"フィアレス":"通常"} / BAN${settings.banCount} / ${settings.matchType}</div>
      <div>人数：A ${playersA.length}/${settings.teamSize}　B ${playersB.length}/${settings.teamSize}</div>
      <button onclick="toggleReady()" ${myPlayerIndex>=0?"":"disabled"}>${ready?"OK解除":"準備OK"}</button>
      <button onclick="startDraft()" ${isHost&&allReady()?"":"disabled"}>スタート</button>
      <div>${isHost?"全員OKでスタートできます":"ホストの開始を待っています"}</div>
    `;
  }

  if(phase==="ban"){
    html=`
      <div>BANフェーズ：各チーム${settings.banCount}体まで</div>
      <div>A ${bansA.length}/${settings.banCount}　B ${bansB.length}/${settings.banCount}</div>
    `;
  }

  if(phase==="banReveal"){
    html=`<div class="bigPick">BAN結果表示中</div>`;
  }

  if(phase==="pick"){
    const cur=pickOrder[pickCount];
    const mine=cur&&cur.team===currentTeam&&cur.player===myPlayerIndex;

    html=`
      <div>現在：チーム${cur.team} Player${cur.player+1}</div>
      <div>${mine?"あなたの番です":"待機中"}</div>
      <div class="bigPick">${selectedPick||"未選択"}</div>
      <button onclick="confirmPick()" ${mine&&selectedPick?"":"disabled"}>決定</button>
    `;
  }

  if(phase==="result"){
    html=`<div class="bigPick">ドラフト完了</div>`;
  }

  pickControl.innerHTML=html;
}

function renderAll(){
  updateUI();
  renderFilters();
  renderPokemon();
  renderTeams();
  renderControl();
}

function createRoomWithRules(){
  settings={
    teamSize:Number(teamSizeSelect.value),
    mode:modeSelect.value,
    banCount:Number(banCountSelect.value),
    matchType:matchTypeSelect.value
  };

  stopListening();
  roomId=randomId();
  isHost=true;
  currentTeam="A";

  phase="waiting";
  timer=0;
  playersA=[myId];
  playersB=[];
  readyA=[false];
  readyB=[];
  bansA=[];
  bansB=[];
  picksA=[];
  picksB=[];
  pickCount=0;
  selectedPick=null;
  pickOrder=makePickOrder(settings.teamSize);

  showOnly("gameScreen");

  roomRef().set({
    hostId:myId,
    phase,timer,settings,
    playersA,playersB,readyA,readyB,
    bansA,bansB,picksA,picksB,
    pickCount,pickOrder
  }).then(()=>{
    listenRoom();
    renderAll();
  });
}

function randomId(){
  const c="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let id="";
  for(let i=0;i<5;i++){
    id+=c[Math.floor(Math.random()*c.length)];
  }
  return id;
}

function selectJoinTeam(team){
  joinTeam=team;
  joinTeamA.classList.remove("selectedTeam");
  joinTeamB.classList.remove("selectedTeam");
  document.getElementById("joinTeam"+team).classList.add("selectedTeam");
  selectedJoinTeam.innerText=team+"チームを選択中";
  checkJoinReady();
}

function checkJoinReady(){
  loginButton.disabled=!(joinRoomId.value.trim()&&joinTeam);
}

function joinRoom(){
  roomId=joinRoomId.value.trim().toUpperCase();

  if(!roomId||!joinTeam){
    alert("ロビーIDとチームを選択してください");
    return;
  }

  stopListening();
  currentTeam=joinTeam;
  isHost=false;

  roomRef().once("value").then(s=>{
    if(!s.exists()){
      alert("ロビーが見つかりません");
      return;
    }

    const d=s.val();

    if(d.phase!=="waiting"){
      alert("このロビーは開始済みです");
      return;
    }

    settings=d.settings;

    joinTeamSlot(currentTeam).then(ok=>{
      if(!ok)return;
      showOnly("gameScreen");
      listenRoom();
    });
  });
}

function joinTeamSlot(team){
  const pk=team==="A"?"playersA":"playersB";
  const rk=team==="A"?"readyA":"readyB";

  return roomRef().transaction(room=>{
    if(!room)return room;

    room[pk]=room[pk]||[];
    room[rk]=room[rk]||[];

    if(room[pk].includes(myId))return room;
    if(room[pk].length>=room.settings.teamSize)return;

    room[pk].push(myId);
    room[rk].push(false);

    return room;
  }).then(r=>{
    if(!r.committed){
      alert("このチームは満員です");
      return false;
    }

    const room=r.snapshot.val();
    return room[pk].includes(myId);
  });
}

function stopListening(){
  if(roomId&&listening){
    roomRef().off();
  }
  listening=false;
}

function listenRoom(){
  if(listening)return;
  listening=true;

  roomRef().on("value",s=>{
    const d=s.val();
    if(!d)return;

    phase=d.phase||"waiting";
    timer=d.timer||0;
    settings=d.settings||settings;
    playersA=d.playersA||[];
    playersB=d.playersB||[];
    readyA=d.readyA||[];
    readyB=d.readyB||[];
    bansA=d.bansA||[];
    bansB=d.bansB||[];
    picksA=d.picksA||[];
    picksB=d.picksB||[];
    pickCount=d.pickCount||0;
    pickOrder=d.pickOrder||makePickOrder(settings.teamSize);

    updateMyPlayerIndex();
    renderAll();
  });
}

function updateMyPlayerIndex(){
  myPlayerIndex=(currentTeam==="A"?playersA:playersB).indexOf(myId);
}

function syncState(){
  if(!roomId)return;

  roomRef().update({
    phase,timer,settings,
    playersA,playersB,readyA,readyB,
    bansA,bansB,picksA,picksB,
    pickCount,pickOrder
  });
}

function toggleReady(){
  if(myPlayerIndex<0)return;

  if(currentTeam==="A"){
    readyA[myPlayerIndex]=!readyA[myPlayerIndex];
  }else{
    readyB[myPlayerIndex]=!readyB[myPlayerIndex];
  }

  syncState();
}

function allJoined(){
  return playersA.length===settings.teamSize&&playersB.length===settings.teamSize;
}

function allReady(){
  return allJoined()&&
    readyA.length===settings.teamSize&&
    readyB.length===settings.teamSize&&
    readyA.every(Boolean)&&
    readyB.every(Boolean);
}

function startDraft(){
  if(!isHost)return;

  if(!allReady()){
    alert("全員参加＋全員OKで開始できます");
    return;
  }

  startBan();
}

function startBan(){
  phase="ban";
  timer=20;
  syncState();
  popup("BANピック");
  runTimer(revealBan);
}

function revealBan(){
  phase="banReveal";
  syncState();
  popup("BAN結果表示");

  setTimeout(()=>{
    if(isHost)startPick();
  },3000);
}

function startPick(){
  phase="pick";
  timer=15;
  pickCount=0;
  selectedPick=null;
  pickOrder=makePickOrder(settings.teamSize);
  syncState();
  runTimer(autoPick);
}

function nextTurn(){
  clearInterval(interval);
  pickCount++;

  if(pickCount>=pickOrder.length){
    endGame();
    return;
  }

  timer=15;
  selectedPick=null;
  syncState();
  runTimer(autoPick);
}

function endGame(){
  phase="result";
  timer=0;
  selectedPick=null;
  syncState();
}

function runTimer(cb){
  clearInterval(interval);

  if(!isHost)return;

  interval=setInterval(()=>{
    timer--;
    syncState();

    if(timer<=0){
      clearInterval(interval);
      cb();
    }
  },1000);
}

function selectBan(name){
  if(phase!=="ban"||myPlayerIndex<0)return;

  let bans=currentTeam==="A"?bansA:bansB;

  if(bans.includes(name)){
    if(currentTeam==="A"){
      bansA=bansA.filter(x=>x!==name);
    }else{
      bansB=bansB.filter(x=>x!==name);
    }
  }else{
    if(bans.length>=settings.banCount)return;
    bans.push(name);
  }

  syncState();
}

function choosePick(name){
  if(phase!=="pick")return;

  const cur=pickOrder[pickCount];

  if(!cur||cur.team!==currentTeam||cur.player!==myPlayerIndex)return;

  if(
    bansA.includes(name)||
    bansB.includes(name)||
    picksA.includes(name)||
    picksB.includes(name)
  )return;

  selectedPick=name;
  renderAll();
}

function confirmPick(){
  const cur=pickOrder[pickCount];

  if(!cur||!selectedPick)return;

  if(cur.team==="A"){
    picksA[cur.player]=selectedPick;
  }else{
    picksB[cur.player]=selectedPick;
  }

  selectedPick=null;
  nextTurn();
}

function autoPick(){
  const cur=pickOrder[pickCount];
  if(!cur)return;

  const available=pokemon
    .map(p=>p.name)
    .filter(n=>
      !bansA.includes(n)&&
      !bansB.includes(n)&&
      !picksA.includes(n)&&
      !picksB.includes(n)
    );

  if(!available.length){
    endGame();
    return;
  }

  const p=available[Math.floor(Math.random()*available.length)];

  if(cur.team==="A"){
    picksA[cur.player]=p;
  }else{
    picksB[cur.player]=p;
  }

  nextTurn();
}

function popup(text){
  popup.innerHTML=`
    <div class="popupContent">
      <div class="popupTitle">${text}</div>
    </div>
  `;
  popup.classList.remove("hidden");

  setTimeout(()=>{
    popup.classList.add("hidden");
  },1500);
}

function copyRoomId(){
  navigator.clipboard.writeText(roomId)
    .then(()=>alert("コピーしました："+roomId))
    .catch(()=>alert(roomId));
}

showOnly("homeScreen");
</script>
</body>
</html>
